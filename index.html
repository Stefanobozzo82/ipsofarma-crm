<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ipsofarma · Gestionale</title>
<style>
:root{
  --side:#192231;--side2:#212d40;--side-active:#293a55;--side-txt:#d2dbe7;--side-muted:#7e8da4;--side-line:#2a3850;
  --bg:#f4f6f8;--surface:#ffffff;--surface2:#fafbfc;--border:#e5e9ee;--border2:#d6dce3;
  --txt:#1b2531;--muted:#5f6b7a;--faint:#9aa5b2;
  --accent:#0ea371;--accent-d:#0b855d;--accent-soft:#0ea3711a;
  --blue:#2f7fe0;--blue-s:#2f7fe016;--amber:#cd8b1f;--amber-s:#cd8b1f1c;
  --violet:#7c5cd6;--violet-s:#7c5cd616;--gray:#7a8696;--gray-s:#7a86961a;--red:#d85c54;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
  --sh:0 1px 2px #1b25310a,0 1px 3px #1b25310f;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:clamp(14px,0.25vw + 12.4px,16px);line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#c4ccd5;border-radius:6px}::-webkit-scrollbar-track{background:transparent}

.app{display:flex;height:100vh;overflow:hidden}

/* ---------- Sidebar ---------- */
.sidebar{width:236px;flex-shrink:0;background:var(--side);color:var(--side-txt);display:flex;flex-direction:column;border-right:1px solid var(--side-line);height:100vh;overflow-y:auto}
.side-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 14px}
.mark{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#16c98c,#0c8a5e);display:grid;place-items:center;color:#04231a;font-weight:800;font-size:15px}
.side-logo .nm{font-weight:700;font-size:14.5px;letter-spacing:.2px}
.side-logo .nm small{display:block;font-weight:400;font-size:10.5px;color:var(--side-muted);letter-spacing:.3px}
.nav{overflow-y:auto;padding:6px 10px}
.side-spacer{flex:1}
.nav-group{margin-top:6px}
.nav-group .gl{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--side-muted);padding:5px 10px 3px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;color:var(--side-txt);font-size:14px;font-weight:500;border:none;background:none;width:100%;text-align:left;margin-bottom:1px;transition:background .12s,color .12s}
.nav-item:hover{background:var(--side2)}
.nav-item.active{background:var(--side-active);color:#fff;font-weight:600}
.nav-item .ic{width:18px;text-align:center;opacity:.85;font-size:15px}
.nav-item .cnt{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--side-muted);background:#0e1626;padding:1px 7px;border-radius:10px}
.nav-item.active .cnt{color:#cfe9dd;background:#0e3a2b}
.side-foot{padding:12px 16px;border-top:1px solid var(--side-line);font-size:10.5px;color:var(--side-muted);font-family:var(--mono)}

/* ---------- Workspace ---------- */
.workspace{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:56px;flex-shrink:0;background:transparent;display:flex;align-items:center;gap:14px;padding:0 clamp(14px,1.6vw,32px);width:100%;max-width:1760px;margin:0 auto}
/* Ricerca globale */
.g-search-wrap{position:relative;flex:1;max-width:380px}
.g-search{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:6px 12px}
.g-search input{border:none;background:transparent;outline:none;font-size:13px;color:var(--txt);width:100%}
.g-search-res{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:10px;box-shadow:0 8px 24px #0002;z-index:60;max-height:360px;overflow-y:auto;min-width:320px}
@media(max-width:600px){
  .g-search-wrap{flex:1;max-width:none}
  .g-search-res{position:fixed;left:8px;right:8px;top:auto;min-width:0;width:auto}
}
.g-res-item{padding:8px 14px;cursor:pointer;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap}
.g-res-item:last-child{border-bottom:none}
.g-res-item:hover{background:var(--surface2)}
.g-res-accent{background:var(--accent-soft)!important}
.g-res-accent:hover{background:var(--accent-soft)!important;filter:brightness(.95)}
.g-res-tag{font-size:11px;color:var(--muted);flex-shrink:0;min-width:54px;text-transform:uppercase;letter-spacing:.3px}
.g-res-main{font-size:13px;font-weight:600;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.g-res-sub{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis}
@media(max-width:600px){.g-res-main{white-space:normal}.g-res-sub{width:100%;margin-left:62px}}
.overdue-badge{display:inline-block;background:var(--red);color:#fff;border-radius:10px;font-size:11px;font-weight:700;padding:1px 6px;margin-left:5px;vertical-align:middle;line-height:1.4}
.crumb{font-weight:700;font-size:15px}
.crumb .back{background:none;border:none;color:var(--muted);font-size:13px;margin-right:4px;padding:4px 8px;border-radius:6px}
.crumb .back:hover{background:var(--bg);color:var(--txt)}
.topbar .sp{flex:1}
@media(max-width:760px){
  .topbar{height:auto;min-height:56px;flex-wrap:wrap;padding-top:10px;padding-bottom:10px;row-gap:8px}
  .topbar .sp{flex-basis:100%;height:0}
  #topActions{flex:1 1 100%;display:flex;flex-wrap:wrap;gap:8px}
  #topActions .btn{flex:1 1 auto;justify-content:center;white-space:nowrap}
}
.search{position:relative}
.search input{width:230px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 11px 7px 30px;font-size:13px;color:var(--txt)}
.search input:focus{outline:none;border-color:var(--accent);background:#fff}
.search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:13px}
.seg{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:2px}
.seg button{border:none;background:none;padding:5px 11px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--muted)}
.seg button.on{background:#fff;color:var(--txt);box-shadow:var(--sh)}
.btn{border:1px solid var(--border2);background:#fff;color:var(--txt);padding:7px 13px;border-radius:8px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;box-shadow:var(--sh);transition:border-color .12s,background .12s,transform .08s}
.btn:hover{border-color:var(--faint)}
.btn:active:not(:disabled){transform:scale(.96)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-d)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{box-shadow:none;border-color:transparent;background:transparent}
.btn-del{color:var(--red);border-color:#e9c6c3;background:#fff;box-shadow:var(--sh)}
.btn-del:hover{background:#fdf1f0;border-color:var(--red)}

.content{flex:1;overflow-y:auto;padding:clamp(14px,1.6vw,32px);width:100%;max-width:1760px;margin:0 auto}
/* Dashboard schermo intero */
.content.dash-view{overflow:hidden!important;display:flex;flex-direction:column;padding:clamp(10px,1.2vw,22px)}
.dash-layout{display:flex;flex-direction:column;flex:1;min-height:0;gap:8px}
.dash-layout .page-head{flex-shrink:0;margin-bottom:0}
.dash-layout .stats{margin-bottom:0;gap:8px}
.dash-layout .stat{padding:10px 14px}
.dash-layout .sl{font-size:12px}
.dash-layout .sv{font-size:clamp(16px,1.6vw,22px);line-height:1.2}
.dash-layout .sx{font-size:11px}
.dash-layout .panel{flex:1;min-height:0;margin-bottom:0;display:flex;flex-direction:column}
.dash-layout .panel-h{flex-shrink:0}
.dash-layout .chart-wrap{flex:1;min-height:0;overflow:hidden;padding:8px 16px 6px}
.dash-layout .chart-wrap svg{display:block;width:100%;height:100%}
@media(max-width:760px){.content.dash-view{overflow-y:auto!important}.dash-layout .panel{flex:none}.dash-layout .chart-wrap svg{height:auto}}
.page-title{font-size:18px;font-weight:700;margin-bottom:16px}
.page-sub{color:var(--faint);font-size:12.5px;margin-top:-13px;margin-bottom:18px}

/* ---------- Table ---------- */
.tablecard{background:var(--surface);border:1px solid var(--border);border-radius:11px;box-shadow:var(--sh);overflow:hidden}
table.tbl{width:100%;border-collapse:collapse}
table.tbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--surface2)}
table.tbl th.right{text-align:right}
table.tbl td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tbody tr{cursor:pointer;transition:background .12s}
table.tbl tbody tr:hover{background:var(--surface2)}
.t-num{font-family:var(--mono);font-weight:600;color:var(--accent-d);font-size:12.5px}
.t-party{font-weight:600}
.t-mut{color:var(--muted);font-family:var(--mono);font-size:12px}
.t-amt{font-family:var(--mono);font-weight:600;text-align:right}
.right{text-align:right}
.dlist{background:var(--surface);border:1px solid var(--border);border-radius:11px;box-shadow:var(--sh);overflow:hidden}
.dhead,.drow{display:grid;grid-template-columns:150px 1fr 100px 130px 120px 105px 120px;gap:14px;align-items:center;padding:12px 18px}
.dhead{background:var(--surface2);border-bottom:1px solid var(--border);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700}
.drow{border-bottom:1px solid var(--border);cursor:pointer;font-size:13px;transition:background .12s}
.drow:last-child{border-bottom:none}
.drow:hover{background:var(--surface2)}
.dhead .rt,.dr-rows,.dr-tot,.dr-imp,.dr-iva{text-align:right}
.dhead .sh{cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px}
.dhead .sh.rt{justify-content:flex-end}
.dhead .sh:hover{color:var(--muted)}
.dhead .sh.on{color:var(--accent-d)}
.dhead .sh .ar{font-size:11px;width:8px}
.tbl th.thsort{cursor:pointer;user-select:none;white-space:nowrap}
.tbl th.thsort:hover{color:var(--muted)}
.tbl th.thsort.on{color:var(--accent-d)}
.dr-tot{font-family:var(--mono);font-weight:600}
.dr-imp,.dr-iva{font-family:var(--mono);color:var(--muted);font-size:12.5px}
.dlist.with-check .dhead,.dlist.with-check .drow{grid-template-columns:34px 150px 1fr 100px 130px 120px 105px 120px}
.dr-check{display:flex;align-items:center}
.dr-check input{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
.bulkbar{display:flex;align-items:center;gap:9px;background:#0e3a2b;color:#cfe9dd;border:1px solid #1a6b4d;border-radius:10px;padding:9px 14px;margin-bottom:12px;font-size:13px;font-weight:600;box-shadow:var(--sh)}
@media(max-width:680px){
  .dhead{display:none}
  .drow{grid-template-columns:1fr auto;grid-template-areas:'num tot' 'party party' 'status date' 'imp iva';gap:5px 10px;padding:13px 15px}
  .dr-num{grid-area:num}.dr-party{grid-area:party}
  .dr-date{grid-area:date;justify-self:end;font-size:12px}
  .dr-status{grid-area:status}.dr-tot{grid-area:tot;justify-self:end;font-size:14.5px}
  .dr-imp{grid-area:imp;justify-self:start;font-size:11.5px}.dr-iva{grid-area:iva;justify-self:end;font-size:11.5px}
  .dr-imp::before{content:'Imp. ';color:var(--faint)}.dr-iva::before{content:'IVA ';color:var(--faint)}
  .dr-rows{display:none}
  .dlist.with-check .drow{grid-template-columns:24px 1fr auto;grid-template-areas:'chk num tot' 'chk party party' 'chk status date' 'chk imp iva'}
  .dr-check{grid-area:chk;align-self:start;padding-top:2px}
  .tablecard{overflow-x:auto}
}
.tbl-scroll-hint{display:none}
@media(max-width:700px){.tbl-scroll-hint{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--muted);padding:0 0 6px}}

/* pills */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;font-family:var(--sans)}
.pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.p-green{color:var(--accent-d);background:var(--accent-soft)}
.p-blue{color:var(--blue);background:var(--blue-s)}
.p-amber{color:var(--amber);background:var(--amber-s)}
.p-violet{color:var(--violet);background:var(--violet-s)}
.p-gray{color:var(--gray);background:var(--gray-s)}
.p-red{color:var(--red);background:#d85c541a}

/* ---------- Pipeline ---------- */
.pipe{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
.pcol{background:var(--surface2);border:1px solid var(--border);border-radius:11px;min-height:120px}
.pcol-h{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);font-weight:700;font-size:12.5px}
.pcol-h .dot{width:8px;height:8px;border-radius:50%}
.pcol-h .n{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);background:#fff;border:1px solid var(--border);padding:1px 8px;border-radius:10px}
.pcol-b{padding:10px;display:flex;flex-direction:column;gap:9px}
.pcard{background:#fff;border:1px solid var(--border);border-radius:9px;padding:11px 12px;box-shadow:var(--sh);cursor:pointer}
.pcard:hover{border-color:var(--border2);transform:translateY(-1px);transition:.12s}
.pcard .pn{font-family:var(--mono);font-size:11.5px;color:var(--accent-d);font-weight:600}
.pcard .pp{font-weight:600;font-size:13px;margin:3px 0 6px}
.pcard .pf{display:flex;align-items:center;justify-content:space-between}
.pcard .pa{font-family:var(--mono);font-weight:600;font-size:12.5px}
.pcol-empty{padding:18px;text-align:center;color:var(--faint);font-size:12px}

/* ---------- Dashboard ---------- */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px;box-shadow:var(--sh);animation:fadeUp .3s ease backwards}
.kpis .kpi:nth-child(2){animation-delay:.04s}
.kpis .kpi:nth-child(3){animation-delay:.08s}
.kpis .kpi:nth-child(4){animation-delay:.12s}
.kpi .kl{font-size:11.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px}
.kpi .kv{font-size:26px;font-weight:700;font-family:var(--mono);margin-top:8px;letter-spacing:-.5px}
.kpi .kx{font-size:11px;color:var(--faint);margin-top:2px}
.kpi .ico{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:14px}
.kpi.clickable{cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s}
.kpi.clickable:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 6px 18px #1b25311c}
.kgo{color:var(--accent-d);font-weight:700;margin-left:6px;opacity:0;transition:.12s}
.kpi.clickable:hover .kgo{opacity:1}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px 18px;box-shadow:var(--sh);animation:fadeUp .3s ease backwards}
.stats .stat:nth-child(2){animation-delay:.04s}
.stats .stat:nth-child(3){animation-delay:.08s}
.stats .stat:nth-child(4){animation-delay:.12s}
.stats .stat:nth-child(5){animation-delay:.16s}
.stats .stat:nth-child(6){animation-delay:.2s}
.stat .sl{font-size:11.5px;color:var(--muted);font-weight:600}
.stat .sv{font-size:25px;font-weight:700;font-family:var(--mono);margin-top:8px;letter-spacing:-.5px}
.stat .sx{font-size:11px;color:var(--faint);margin-top:3px}
.legend{margin-left:auto;display:flex;gap:14px}
.legend .lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:500}
.legend .lg i{width:10px;height:10px;border-radius:3px;display:inline-block}
.chart-wrap{padding:16px 18px 10px;position:relative}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.chart-wrap .cbar{transform-box:fill-box;transform-origin:bottom;animation:barGrow .45s cubic-bezier(.22,1,.36,1) backwards}
.hit{fill:transparent;pointer-events:all;cursor:pointer}
.hit:hover{fill:rgba(14,163,113,.07)}
.hit.act{fill:rgba(14,163,113,.10)}
.chart-tip{position:absolute;z-index:6;pointer-events:none;background:#1f2733;color:#fff;border-radius:9px;padding:9px 11px;font-size:11.5px;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.28);transform:translate(-50%,-100%);white-space:nowrap;opacity:0;display:none;min-width:150px}
.chart-tip.show{opacity:1;display:block}
.chart-tip .ct-m{font-weight:700;margin-bottom:4px;font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;color:#cfd6df}
.chart-tip .ct-r{display:flex;align-items:center;gap:10px;justify-content:space-between}
.chart-tip .ct-r span{display:flex;align-items:center;gap:6px}
.chart-tip .ct-r i{width:8px;height:8px;border-radius:2px;display:inline-block}
.chart-tip .ct-r b{font-family:var(--mono)}
.chart-tip .ct-mg{border-top:1px solid rgba(255,255,255,.16);margin-top:4px;padding-top:4px}
.chart-empty{padding:42px 18px;text-align:center;color:var(--faint);font-size:12.5px}
.search-sum{background:#eef6f2;border:1px solid #d4e7dd;color:#1d6b4e;border-radius:9px;padding:10px 14px;font-size:12.5px;margin-bottom:14px}
.search-sum b{font-family:var(--mono);font-weight:700}
@media(max-width:760px){.stats{grid-template-columns:1fr}.report-grid{grid-template-columns:1fr!important}}

/* ---------- Detail ---------- */
.detail{max-width:1060px}
.d-hero{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh);padding:20px 22px;margin-bottom:16px}
.d-top{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.d-num{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--txt)}
.d-meta{color:var(--muted);font-size:12.5px;margin-top:3px}
.d-meta b{color:var(--txt);font-weight:600}
.d-top .sp{flex:1}
.d-tot{text-align:right}
.d-tot .v{font-family:var(--mono);font-size:22px;font-weight:700}
.d-tot .l{font-size:11px;color:var(--faint)}
.d-actions{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--border)}
.print-menu-wrap{position:relative}
.print-menu{display:none;position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:10px;box-shadow:0 8px 24px #0002;z-index:60;min-width:230px;overflow:hidden}
.print-menu.show{display:block}
.print-menu button{display:flex;flex-direction:column;align-items:flex-start;gap:1px;width:100%;text-align:left;padding:10px 14px;border:none;background:none;font-size:13px;font-weight:600;color:var(--txt);cursor:pointer}
.print-menu button small{font-weight:400;color:var(--muted);font-size:11px}
.print-menu button:hover{background:var(--surface2)}
.print-menu button:not(:last-child){border-bottom:1px solid var(--border)}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh);margin-bottom:16px;overflow:hidden}
.panel-h{padding:13px 18px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
table.lines{width:100%;border-collapse:collapse;font-size:12.5px}
.lines-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;position:relative}
.lines-scroll-hint{display:none}
@media(max-width:700px){
  .lines-scroll{margin:0 -1px}
  .lines-scroll table.lines{min-width:640px}
  .lines-scroll-hint{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--muted);padding:6px 0 2px;background:var(--surface2);border-bottom:1px solid var(--border)}
}
table.lines th{text-align:left;padding:9px 18px;color:var(--faint);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--surface2)}
table.lines th.right{text-align:right}

async function initCatalog(){
  if(CATALOG.length||typeof CATB64==="undefined"||!CATB64)return;
  try{
    if(typeof DecompressionStream==="undefined"){CATALOG=[];return;}
    const bin=Uint8Array.from(atob(CATB64),c=>c.charCodeAt(0));
    const txt=await new Response(new Blob([bin]).stream().pipeThrough(new DecompressionStream("gzip"))).text();
    const o=JSON.parse(txt),T=o.t;
    CATALOG=o.r.map(function(r){return {codice:r[0],descrizione:r[1],tipologia:T[r[2]],acq:0,ven:r[3],iva:r[4],cnd:r[5],rdm:r[6],conf:r[7],note:""};});
  }catch(e){console.error("catalogo",e);CATALOG=[];}
}</script>
<script>
/* ===== Persistenza ===== */
const KEY='ipsofarma:crm-v6';
let FB_STATUS='·';
function gdSetStatus(s){FB_STATUS=s;const el=document.getElementById('gdStatus');if(el)el.textContent=s;}
function fbSetStatus(s){gdSetStatus(s);}
function gdScheduleSave(){ghScheduleSave();}
function fbScheduleSave(){ghScheduleSave();}

/* ===== GITHUB BACKUP AUTOMATICO ===== */
let GH_USER=localStorage.getItem('gh_user')||null,GH_SHA=null,GH_TIMER=null;
const GH_REPO='ipsofarma-crm';
const GH_FILE='backup.json';

/* ===== Merge intelligente multi-dispositivo (ordini, DDT, fatture) =====
 * Invece di sovrascrivere tutto il backup ad ogni salvataggio, confrontiamo
 * la versione "base" (l'ultima scaricata/salvata con successo su questo
 * dispositivo) con la versione locale attuale e quella remota su GitHub:
 * per ogni documento, se solo uno dei due lati l'ha modificato, teniamo
 * quella modifica; se lo hanno modificato entrambi, vince quella locale ma
 * avvisiamo l'utente (vero conflitto, raro). I documenti nuovi o cancellati
 * su un solo lato vengono aggiunti/rimossi correttamente su entrambi.
 */
const MERGE_COLLS=['ordiniCliente','ordiniFornitore','ddt','fattureCliente','fattureFornitore','clienti','fornitori','preventivi'];
let GH_BASE=null;
function snapshotMergeColls(db){
  const s={};MERGE_COLLS.forEach(c=>{s[c]=JSON.parse(JSON.stringify((db&&db[c])||[]));});return s;
}
function loadGhBase(){
  try{const raw=localStorage.getItem('gh_base_docs');GH_BASE=raw?JSON.parse(raw):null;}catch(e){GH_BASE=null;}
}
function saveGhBase(snap){
  GH_BASE=snap;
  try{localStorage.setItem('gh_base_docs',JSON.stringify(snap));}catch(e){/* storage pieno: pazienza, si riallinea al prossimo giro */}
}
function deepEq(a,b){return JSON.stringify(a)===JSON.stringify(b);}
function mergeCollection(base,local,remote){
  const bMap=new Map((base||[]).map(x=>[x.id,x]));
  const lMap=new Map((local||[]).map(x=>[x.id,x]));
  const rMap=new Map((remote||[]).map(x=>[x.id,x]));
  const ids=new Set([...bMap.keys(),...lMap.keys(),...rMap.keys()]);
  const out=[];let conflict=false;
  ids.forEach(id=>{
    const b=bMap.get(id),l=lMap.get(id),r=rMap.get(id);
    if(!b){ // non c'era nella base: nuovo su un lato o entrambi
      if(l&&r)out.push(l); // stesso id creato su entrambi (rarissimo): tiene locale
      else if(l)out.push(l);
      else if(r)out.push(r);
      return;
    }
    // c'era nella base
    if(!l&&!r)return; // cancellato su entrambi
    if(!l){ // cancellato in locale
      if(r&&!deepEq(r,b))out.push(r); // ma modificato da remoto: non perdere quella modifica
      return; // altrimenti resta cancellato
    }
    if(!r){ // cancellato da remoto
      if(l&&!deepEq(l,b))out.push(l); // ma modificato in locale: non perdere il mio lavoro
      return; // altrimenti resta cancellato
    }
    // presente in tutti e tre
    const lc=!deepEq(l,b),rc=!deepEq(r,b);
    if(!lc&&!rc)out.push(l);
    else if(lc&&!rc)out.push(l);
    else if(!lc&&rc)out.push(r);
    else{out.push(l);conflict=true;} // modificato da entrambi: vince locale, segnaliamo
  });
  return{result:out,conflict};
}
function mergeAllDocs(base,localDB,remoteDB){
  let anyConflict=false;
  MERGE_COLLS.forEach(c=>{
    const{result,conflict}=mergeCollection(base?base[c]:[],localDB[c]||[],remoteDB[c]||[]);
    localDB[c]=result;if(conflict)anyConflict=true;
  });
  return anyConflict;
}
function ghToken(){return localStorage.getItem('gh_token')||'';}
function ghUser(){return localStorage.getItem('gh_user')||'';}

async function ghInit(){
  if(GH_USER)return true;
  const tok=ghToken();if(!tok)return false;
  try{
    const r=await fetch('https://api.github.com/user',
      {headers:{Authorization:'token '+tok,'User-Agent':'Ipsofarma-CRM'}});
    if(!r.ok){gdSetStatus('token non valido ('+r.status+')');return false;}
    const d=await r.json();
    GH_USER=d.login;
    localStorage.setItem('gh_user',GH_USER);
    gdSetStatus('connesso come '+GH_USER+' ✅');
    return true;
  }catch(e){gdSetStatus('errore connessione');return false;}
}

function toB64(str){return btoa(unescape(encodeURIComponent(str)));}
function fromB64(str){return decodeURIComponent(escape(atob(str.replace(/\n/g,''))));}

async function ghFetchRemote(){
  const tok=ghToken();if(!tok)return null;
  if(!GH_USER){
    let ru;
    try{ru=await fetch('https://api.github.com/user',{headers:{Authorization:'token '+tok,'User-Agent':'Ipsofarma-CRM'}});}
    catch(e){return null;}
    if(!ru.ok)return null;
    const du=await ru.json();GH_USER=du.login;localStorage.setItem('gh_user',GH_USER);
  }
  const url='https://api.github.com/repos/'+GH_USER+'/'+GH_REPO+'/contents/'+GH_FILE;
  let r;
  try{r=await fetch(url,{headers:{Authorization:'token '+tok,'User-Agent':'Ipsofarma-CRM'}});}
  catch(e){return null;}
  if(!r.ok)return null;
  let d;
  try{d=await r.json();}catch(e){return null;}
  if(!d)return null;
  let data;
  try{
    let jsonText;
    if(d.content&&d.content.trim()){
      const raw=atob(d.content.replace(/\n/g,''));
      const arr=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
      jsonText=new TextDecoder().decode(arr);
    }else{
      // File grande: la Contents API non include il testo inline. Usiamo la Git Blobs API,
      // che è indicizzata per SHA del contenuto (immutabile) e quindi non soffre della cache
      // che invece può servire versioni vecchie da raw.githubusercontent.com per qualche minuto.
      const blobR=await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/git/blobs/${d.sha}`,
        {headers:{Authorization:'token '+tok,'User-Agent':'Ipsofarma-CRM'}});
      if(!blobR.ok)return null;
      const blobD=await blobR.json();
      const raw=atob((blobD.content||'').replace(/\n/g,''));
      const arr=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
      jsonText=new TextDecoder().decode(arr);
    }
    data=JSON.parse(jsonText);
  }catch(e){return null;}
  if(!data||typeof data!=='object')return null;
  return{sha:d.sha,data};
}
async function ghLoad(){
  const tok=ghToken();
  if(!tok){toast('⚠️ Inserisci il token GitHub nelle impostazioni');return false;}
  gdSetStatus('download backup…');
  const fetched=await ghFetchRemote();
  if(!fetched){toast('❌ Errore caricamento backup da GitHub');return false;}
  GH_SHA=fetched.sha;localStorage.setItem('gh_sha',GH_SHA);
  const data=fetched.data;
  // Ripristina hash password (sincronizza su tutti i dispositivi)
  if(data._security){
    if(data._security.pwdHash)localStorage.setItem('app_pwd_hash',data._security.pwdHash);
    else if(data._security.pwdHash==='')localStorage.removeItem('app_pwd_hash');
    if(data._security.viewerHash)localStorage.setItem('app_pwd_viewer_hash',data._security.viewerHash);
    else if(data._security.viewerHash==='')localStorage.removeItem('app_pwd_viewer_hash');
    delete data._security;
  }
  const SENSITIVE=['aiKey','aiOkey','aiProvider','aiModel','aiBase','gdClientId'];
  if(DB&&DB.azienda&&data.azienda)SENSITIVE.forEach(k=>{if(DB.azienda[k])data.azienda[k]=DB.azienda[k];});
  DB=data;gdSetStatus('caricato ✅');
  saveGhBase(snapshotMergeColls(DB));
  return true;
}

    const r=await fetch('https://api.github.com/user',{headers:{Authorization:'token '+tok,'User-Agent':'Ipsofarma-CRM'}});

    const d=await r.json();GH_USER=d.login;localStorage.setItem('gh_user',GH_USER);
    // Verifica che il repo esista

async function ghSave(isRetry,hadMergeConflict){
  if(!DB)return;const ok=await ghInit();if(!ok)return;
  try{
    // Merge intelligente: confronta la nostra base di riferimento con lo stato
    // remoto attuale, e unisce eventuali modifiche fatte da un altro dispositivo
    // nel frattempo (invece di sovrascriverle). Rifatto anche al retry: se il
    // primo tentativo di scrittura fallisce per conflitto (qualcun altro ha
    // salvato nel frattempo), dobbiamo riprendere lo sha più recente e
    // rifare il merge contro l'ultimissima versione remota, non riprovare
    // con lo sha ormai superato.
    {
      const fetched=await ghFetchRemote();
      if(fetched){
        GH_SHA=fetched.sha;localStorage.setItem('gh_sha',GH_SHA);
        const conflict=mergeAllDocs(GH_BASE,DB,fetched.data);
        if(conflict)hadMergeConflict=true;
      }
    }
    // Se non abbiamo il SHA, recuperalo (il file potrebbe già esistere)
    if(!GH_SHA){
      const sr=await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`,
        {headers:{Authorization:'token '+ghToken(),'User-Agent':'Ipsofarma-CRM'}});
      if(sr.ok){const sd=await sr.json();GH_SHA=sd.sha;localStorage.setItem('gh_sha',GH_SHA);}
    }
    // Rimuovi dati sensibili prima di salvare su GitHub
    const saveData=JSON.parse(JSON.stringify(DB));
    if(saveData.azienda){
      delete saveData.azienda.ghToken;
      delete saveData.azienda.githubToken;
      delete saveData.azienda.aiKey;
      delete saveData.azienda.aiOkey;
    }
    // Includi hash password nel backup (SHA-256 = non recuperabili, sicuri)
    saveData._security={
      pwdHash:localStorage.getItem('app_pwd_hash')||'',
      viewerHash:localStorage.getItem('app_pwd_viewer_hash')||''
    };
    const content=toB64(JSON.stringify(saveData));
    const sha=GH_SHA||localStorage.getItem('gh_sha');
    const body={message:'Backup '+new Date().toLocaleString('it-IT'),content};
    if(sha)body.sha=sha;
    const r=await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`,
      {method:'PUT',headers:{Authorization:'token '+ghToken(),'Content-Type':'application/json','User-Agent':'Ipsofarma-CRM'},
       body:JSON.stringify(body)});
    if(!r.ok){
      const e=await r.json().catch(()=>({}));
      const msg=e.message||String(r.status);
      // Conflitto di scrittura residuo (raro: qualcuno ha salvato nel frattempo tra il nostro
      // merge e il push). Rifà merge+push una volta sola.
      if(!isRetry&&(r.status===409||/does not match|sha/i.test(msg))){
        return ghSave(true,hadMergeConflict);
      }
      gdSetStatus('errore salvataggio: '+msg);return;
    }
    const d=await r.json();
    GH_SHA=d.content?.sha;if(GH_SHA)localStorage.setItem('gh_sha',GH_SHA);
    saveGhBase(snapshotMergeColls(DB));
    if(hadMergeConflict){
      gdSetStatus('⚠️ salvato: una stessa riga era stata modificata anche da un altro dispositivo — verifica');
      toast('⚠️ Un documento è stato modificato in contemporanea su un altro dispositivo: è stata mantenuta la versione di questo PC. Controlla che nell\'altro PC non ci fossero modifiche da recuperare.');
    }else{
      gdSetStatus('salvato '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})+' ✅');
    }
    try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){}
  }catch(e){console.error('ghSave:',e);gdSetStatus('errore salvataggio');}
}

function ghScheduleSave(){
  if(!ghToken())return;
  clearTimeout(GH_TIMER);GH_TIMER=setTimeout(()=>ghSave().catch(console.error),8000);
}
window.addEventListener('beforeunload',()=>{if(ghToken()&&DB&&GH_SHA)try{ghSave();}catch(e){};});
let DB=null;
const hasWS=()=>{try{return typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function';}catch(e){return false;}};
async function load(){
  try{if(hasWS()){const r=await window.storage.get(KEY);if(r&&r.value){DB=JSON.parse(r.value);return;}}}catch(e){}
  try{const ls=localStorage.getItem(KEY);if(ls){DB=JSON.parse(ls);return;}}catch(e){}
  DB=seed();await persist();
}
async function persist(){
  setSave('salvataggio…');let done=false;
  try{if(hasWS()){await window.storage.set(KEY,JSON.stringify(DB));done=true;}}catch(e){}
  if(!done){try{localStorage.setItem(KEY,JSON.stringify(DB));done=true;}catch(e){}}
  setSave(done?'● tutto salvato':'memoria non disponibile');
  ghScheduleSave();
}

const COLL_BY_T={OC:'ordiniCliente',OF:'ordiniFornitore',DDT:'ddt',FT:'fattureCliente',FTF:'fattureFornitore',PREV:'preventivi'};
function maxDocNum(t){const coll=COLL_BY_T[t];if(!coll||!DB[coll])return 0;let mx=0;const re=new RegExp('^'+t+'\\/\\d{4}\\/(\\d+)$');DB[coll].forEach(d=>{const m=String(d.num||'').match(re);if(m){const n=parseInt(m[1]);if(n>mx)mx=n;}});return mx;}
function syncCounter(t){DB.counters[t]=maxDocNum(t)+1;return DB.counters[t];}
function nextNum(t){syncCounter(t);const n=DB.counters[t]++;return `${t}/${DB.year}/${String(n).padStart(4,'0')}`;}
function peekNum(t){syncCounter(t);return `${t}/${DB.year}/${String(DB.counters[t]).padStart(4,'0')}`;}
function consumeNum(t,val){val=(val||'').trim();const peek=peekNum(t);if(!val||val===peek)return nextNum(t);const m=val.match(new RegExp('^'+t+'/(\\d{4})/(\\d+)$'));if(m){const n=parseInt(m[2]);if(DB.counters[t]<=n)DB.counters[t]=n+1;}return val;}
function scParts(s){return String(s==null?'':s).split('+').map(x=>parseFloat(String(x).trim())||0);}
const scFactor=s=>scParts(s).reduce((f,p)=>f*(1-p/100),1);
const scEff=s=>+(((1-scFactor(s))*100).toFixed(2));
const scLabel=s=>{const e=scEff(s);if(e<=0)return '—';return String(s).includes('+')?String(s).replace(/\s/g,'')+' %':e+'%';};
const lineNet=x=>x.qty*x.prezzo*scFactor(x.sconto);
const imp=r=>r.reduce((s,x)=>s+lineNet(x),0);
const ivaT=r=>r.reduce((s,x)=>s+lineNet(x)*x.iva/100,0);
const tot=r=>imp(r)+ivaT(r);
function lastLinePrice(colls,cod,filter){
  let best=null;
  colls.forEach(coll=>{(DB[coll]||[]).forEach(d=>{
    if(filter&&!filter(d))return;
    const r=(d.righe||[]).find(x=>x.cod===cod);
    if(r&&r.prezzo!=null){if(!best||String(d.data)>String(best.data))best={data:d.data,prezzo:r.prezzo,sconto:r.sconto||0,fornitoreId:d.fornitoreId};}
  });});
  return best;
}

let _allProd=null;
function allProdotti(){
  if(_allProd)return _allProd;
  const map=new Map();
  for(const p of (typeof CATALOG!=='undefined'?CATALOG:[]))map.set(p.codice,p);
  for(const p of DB.prodotti)map.set(p.codice,p);
  _allProd=[...map.values()];
  return _allProd;
}
function prodMatches(q,limit){
  q=(q||'').toLowerCase().trim();if(!q)return [];
  const out=[],arr=allProdotti();
  for(let k=0;k<arr.length;k++){const p=arr[k];if(p.codice.toLowerCase().includes(q)||(p.descrizione||'').toLowerCase().includes(q)){out.push(p);if(out.length>=(limit||10))break;}}
  return out;
}

function findByNum(num){
  if(!num)return null;
  const t=num.split('/')[0];
  const coll={OC:'ordiniCliente',OF:'ordiniFornitore',DDT:'ddt',FT:'fattureCliente',FTF:'fattureFornitore',PREV:'preventivi'}[t];
  if(coll){const item=(DB[coll]||[]).find(x=>x.num===num);if(item)return{coll,item};}
  for(const c of ['fattureFornitore','ordiniFornitore','ordiniCliente','ddt','fattureCliente','preventivi']){
    const item=(DB[c]||[]).find(x=>String(x.num)===String(num));if(item)return{coll:c,item};
  }
  return null;
}

function stat(l,v,x,col,go){return `<div class="stat${go?' stat-go':''}"${go?` onclick="dashGo('${go}')"`:''}><div class="sl">${l}</div><div class="sv" style="color:${col}">${v}</div><div class="sx">${x}</div></div>`;}
const MESI=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
function buildMonthly(){
  const map={};
  const add=(ym,k,v)=>{(map[ym]=map[ym]||{vend:0,acq:0})[k]+=v;};
  const inY=f=>!DASHY||(f.data||'').startsWith(DASHY);
  DB.fattureCliente.filter(inY).forEach(f=>add(f.data.slice(0,7),'vend',tot(f.righe)));
  DB.fattureFornitore.filter(inY).forEach(f=>add(f.data.slice(0,7),'acq',tot(f.righe)));
  return Object.keys(map).sort().map(ym=>{const[y,m]=ym.split('-');return{label:MESI[+m-1]+' '+y.slice(2),vend:map[ym].vend,acq:map[ym].acq};});
}
function niceMax(v){if(v<=0)return 100;const p=Math.pow(10,Math.floor(Math.log10(v)));const n=v/p;const m=n<=1?1:n<=2?2:n<=5?5:10;return m*p;}
function barChart(data){
  if(!data.length)return '<div class="chart-empty">Nessuna fattura registrata. Il grafico si popola man mano che emetti fatture cliente e registri fatture fornitore.</div>';
  const W=760,H=280,padL=60,padR=18,padT=16,padB=34;
  const plotW=W-padL-padR,plotH=H-padT-padB,base=padT+plotH;
  const max=niceMax(Math.max(...data.flatMap(d=>[d.vend,d.acq]),1));
  const n=data.length,gw=plotW/n,bw=Math.min(36,gw*0.30),gap=6;
  const y=v=>base-(v/max)*plotH;
  const fmt=val=>val>=1000?(val/1000).toFixed(val%1000?1:0)+'k':Math.round(val);
  let g='',hits='';
  for(let i=0;i<=4;i++){const val=max*i/4,yy=base-(plotH*i/4);g+=`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#e5e9ee"/><text x="${padL-8}" y="${yy+4}" text-anchor="end" fill="#9aa5b2" font-size="10" font-family="monospace">${fmt(val)}</text>`;}
  data.forEach((d,i)=>{
    const cx=padL+gw*i+gw/2,x1=cx-bw-gap/2,x2=cx+gap/2;
    g+=`<rect class="cbar" style="animation-delay:${i*30}ms" x="${x1}" y="${y(d.vend)}" width="${bw}" height="${base-y(d.vend)}" rx="3" fill="#0ea371"/>`;
    g+=`<rect class="cbar" style="animation-delay:${i*30+15}ms" x="${x2}" y="${y(d.acq)}" width="${bw}" height="${base-y(d.acq)}" rx="3" fill="#7c5cd6"/>`;
    g+=`<text x="${cx}" y="${base+18}" text-anchor="middle" fill="#5f6b7a" font-size="11">${d.label}</text>`;
    hits+=`<rect class="hit" id="hit${i}" x="${padL+gw*i}" y="${padT}" width="${gw}" height="${plotH}" data-i="${i}" onmousemove="chartTip(event,${i})" onmouseleave="chartHide()" onclick="chartTip(event,${i})"/>`;
  });
  const mY=i=>Math.min(base,Math.max(padT,y(data[i].vend-data[i].acq)));
  const mpts=data.map((d,i)=>(padL+gw*i+gw/2)+','+mY(i)).join(' ');
  g+=`<polyline fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" points="${mpts}"/>`;
  data.forEach((d,i)=>{g+=`<circle cx="${padL+gw*i+gw/2}" cy="${mY(i)}" r="3.6" fill="#fff" stroke="#f59e0b" stroke-width="2"/>`;});
  g+=`<line x1="${padL}" y1="${base}" x2="${W-padR}" y2="${base}" stroke="#d6dce3"/>`+hits;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" font-family="system-ui">${g}</svg>`;
}
function chartTip(e,i){
  const wrap=document.querySelector('.chart-wrap'),tip=document.getElementById('chartTip'),d=MONTHLY[i];
  if(!wrap||!tip||!d)return;
  const r=wrap.getBoundingClientRect();
  const px=(e.touches&&e.touches[0]?e.touches[0].clientX:e.clientX)-r.left;
  const py=(e.touches&&e.touches[0]?e.touches[0].clientY:e.clientY)-r.top;
  const mg=d.vend-d.acq;
  tip.innerHTML=`<div class="ct-m">${d.label}</div>
    <div class="ct-r"><span><i style="background:#0ea371"></i>Fatturato</span><b>${eur(d.vend)}</b></div>
    <div class="ct-r"><span><i style="background:#7c5cd6"></i>Acquisti</span><b>${eur(d.acq)}</b></div>
    <div class="ct-r ct-mg"><span>Margine</span><b style="color:${mg>=0?'#5fe3ad':'#ff9a9a'}">${eur(mg)}</b></div>`;
  tip.classList.add('show');
  // Misura la larghezza reale (varia con la lunghezza degli importi): un margine fisso
  // non basta su schermi stretti o vicino ai bordi del grafico, tagliando il popup.
  // Il popup è ancorato al suo bordo inferiore (transform:translate(-50%,-100%)):
  // se "top" è più basso della sua altezza reale, il bordo superiore (dove sta il
  // mese) finisce sopra al contenitore e viene tagliato dall'overflow:hidden del
  // grafico. Misuriamo larghezza e altezza reali invece di usare margini fissi.
  const half=tip.offsetWidth/2+8;
  tip.style.left=Math.max(half,Math.min(px,r.width-half))+'px';
  tip.style.top=Math.max(tip.offsetHeight+8,py-16)+'px';
  document.querySelectorAll('.hit.act').forEach(h=>h.classList.remove('act'));
  const hit=document.getElementById('hit'+i);if(hit)hit.classList.add('act');
}
function chartHide(){const t=document.getElementById('chartTip');if(t)t.classList.remove('show');document.querySelectorAll('.hit.act').forEach(h=>h.classList.remove('act'));}

function statusOf(mod,it){
  if(mod==='prev')return it.ocId?['p-green','Convertito']:['p-amber','Aperto'];
  if(mod==='oc'){const e=evasione(it);return e.state==='completo'?['p-green','Evaso']:e.state==='parziale'?['p-blue','Parziale '+e.pct+'%']:['p-amber','Aperto'];}
  if(mod==='of'){const e=evasione(it);return e.state==='completo'?['p-green','Ricevuto']:e.state==='parziale'?['p-blue','Parziale '+e.pct+'%']:['p-amber','Da ricevere'];}
  if(mod==='ddt')return it.ftId?['p-green','Fatturato']:['p-amber','Da fatturare'];
  if(mod==='ft'){const p=payState(it);return p.state==='completo'?['p-green','Incassata']:p.state==='parziale'?['p-blue','Parziale '+p.pct+'%']:['p-amber','Da incassare'];}
  if(mod==='ftf'){const p=payState(it);return p.state==='completo'?['p-green','Pagata']:p.state==='parziale'?['p-blue','Parziale '+p.pct+'%']:['p-amber','Da pagare'];}
  return ['p-gray','—'];
}
function evasione(o){
  const totQ=o.righe.reduce((s,r)=>s+r.qty,0);
  const evQ=o.righe.reduce((s,r)=>s+Math.min(r.qtyEv||0,r.qty),0);
  const complete=o.righe.length>0&&o.righe.every(r=>(r.qtyEv||0)>=r.qty);
  return {state:evQ<=0?'aperto':complete?'completo':'parziale',pct:totQ?Math.round(evQ/totQ*100):0,evQ,totQ};
}
function payTot(it){
  if(it.pagamenti==null)return it.paid?tot(it.righe):0; // fattura non ancora "toccata" dal nuovo sistema incassi: usa il vecchio stato pagata/non pagata
  return it.pagamenti.reduce((s,p)=>s+(p.importo||0),0);
}
function payState(it){
  const totaleRaw=tot(it.righe);
  const sign=totaleRaw<0?-1:1;
  const totale=totaleRaw*sign; // lavora sempre in valore assoluto (gestisce anche le note di credito, negative)
  const pagato=payTot(it)*sign;
  const state=pagato<=0.004?'aperto':pagato>=totale-0.01?'completo':'parziale';
  const pct=totale?Math.min(100,Math.round(pagato/totale*100)):0;
  const residuo=Math.max(0,totale-pagato)*sign;
  return {totale:totaleRaw,pagato:payTot(it),residuo,state,pct};
}
async function addPagamento(coll,id,importo,data){
  const it=DB[coll].find(x=>x.id===id);if(!it)return;
  importo=parseFloat(importo);
  if(isNaN(importo)||importo===0){toast('Importo non valido');return;}
  if(!it.pagamenti)it.pagamenti=[];
  it.pagamenti.push({data:data||today(),importo:Math.round(importo*100)/100});
  const p=payState(it);
  it.paid=p.state==='completo';
  it.paidDate=it.paid?it.pagamenti[it.pagamenti.length-1].data:null;
  await persist();toast((coll==='fattureFornitore'?'Pagamento':'Incasso')+' registrato');render();
}
async function delPagamento(coll,id,idx){
  const it=DB[coll].find(x=>x.id===id);if(!it||!it.pagamenti)return;
  it.pagamenti.splice(idx,1);
  const p=payState(it);
  it.paid=p.state==='completo';if(!it.paid)it.paidDate=null;
  await persist();render();
}

async function updEv(coll,id,i,val){
  const it=DB[coll].find(x=>x.id===id);if(!it)return;
  let v=parseInt(val||0);if(isNaN(v)||v<0)v=0;if(v>it.righe[i].qty)v=it.righe[i].qty;
  it.righe[i].qtyEv=v;await persist();SEL={coll,item:it};render();
}
async function markAllEv(coll,id,full){
  const it=DB[coll].find(x=>x.id===id);if(!it)return;
  it.righe.forEach(r=>r.qtyEv=full?r.qty:0);await persist();
  toast(full?'Segnato come completo':'Evasione azzerata');SEL={coll,item:it};render();
}
function setSort(key){if(SORT.key===key)SORT.dir=SORT.dir==='asc'?'desc':'asc';else{SORT.key=key;SORT.dir=key==='data'?'desc':'asc';}renderContent();}
function sortVal(key,it,party){
  switch(key){
    case 'num':return it.num;
    case 'party':return (party||'').toLowerCase();
    case 'data':return it.data;
    case 'stato':return statusOf(MOD,it)[1];
    case 'righe':return it.righe.length;
    case 'imp':return imp(it.righe);
    case 'iva':return ivaT(it.righe);
    case 'tot':return tot(it.righe);
  }
  return '';
}
function sh(key,label,cls){const on=SORT.key===key,ar=on?(SORT.dir==='asc'?'↑':'↓'):'';return `<div class="sh ${cls||''} ${on?'on':''}" onclick="setSort('${key}')">${label}<span class="ar">${ar}</span></div>`;}
function setPSort(key){if(PSORT.key===key)PSORT.dir=PSORT.dir==='asc'?'desc':'asc';else{PSORT.key=key;PSORT.dir='asc';}PLIMIT=300;renderContent();}
function psortVal(key,p){
  switch(key){
    case 'codice':return (p.codice||'').toLowerCase();
    case 'descrizione':return (p.descrizione||'').toLowerCase();
    case 'acq':return p.acq||0;
    case 'ven':return p.ven||0;
    case 'conf':return p.conf?parseInt(p.conf):0;
    case 'iva':return p.iva||0;
  }
  return '';
}
function docMatchStatus(mod,it,val){
  if(!val)return true;
  if(mod==='ft'||mod==='ftf')return val==='paid'?!!it.paid:!it.paid;
  if(mod==='oc'){
    if(val==='inevaso')return evasione(it).state!=='completo';
    if(val==='nofatt')return !it.ftId;
    const s=evasione(it).state;const st=s==='completo'?'completo':(s==='parziale'?'parziale':'aperto');return val===st;
  }
  if(mod==='of'){if(val==='inevaso')return evasione(it).state!=='completo';const s=evasione(it).state;const st=s==='completo'?'completo':(s==='parziale'?'parziale':'aperto');return val===st;}
  if(mod==='ddt')return val==='fatt'?!!it.ftId:!it.ftId;
  return true;
}
const FMODS=['ft','ftf','oc','of','ddt'];
function filteredDocRows(){
  const m=META[MOD];const items=DB[m.coll];
  const isForn=(MOD==='of'||MOD==='ftf');
  let rows=items.map(it=>({it,party:(isForn?fornitore(it.fornitoreId):cliente(it.clienteId)).nome}));
  if(Q)rows=rows.filter(r=>r.it.num.toLowerCase().includes(Q)||r.party.toLowerCase().includes(Q));
  if(FMODS.includes(MOD)){
    if(FFILT.forn)rows=rows.filter(r=>(isForn?r.it.fornitoreId:r.it.clienteId)===FFILT.forn);
    if(FFILT.dest)rows=rows.filter(r=>FFILT.dest==='__sede__'?!r.it.destId:r.it.destId===FFILT.dest);
    if(FFILT.paid)rows=rows.filter(r=>docMatchStatus(MOD,r.it,FFILT.paid));
    if(FFILT.from)rows=rows.filter(r=>(r.it.data||'')>=FFILT.from);
    if(FFILT.to)rows=rows.filter(r=>(r.it.data||'')<=FFILT.to);
  }
  return rows;
}
function setFFilt(k,v){FFILT[k]=v;if(k==='forn')FFILT.dest='';PICK.clear();renderContent();}
function clearFFilt(){FFILT={forn:'',paid:'',from:'',to:'',dest:''};PICK.clear();renderContent();}
function togglePick(id){PICK.has(id)?PICK.delete(id):PICK.add(id);renderContent();}
function toggleAll(ch){if(ch)filteredDocRows().forEach(r=>PICK.add(r.it.id));else PICK.clear();renderContent();}

async function bulkDownloadPDF(){
  if(!PICK.size)return;
  const m=META[MOD];if(!m||!m.coll)return;
  const ids=[...PICK];
  const items=DB[m.coll].filter(x=>ids.includes(x.id));
  if(!items.length)return;
  toast('Generazione PDF in corso…');
  try{
    const JsPDF=await loadJsPDF();
    let n=0;
    for(const item of items){
      const doc=new JsPDF({unit:'mm',format:'a4'});
      buildDocPDFPage(doc,m.coll,item);
      doc.save(String(item.num).replace(/\//g,'-')+'.pdf');
      n++;
      await new Promise(r=>setTimeout(r,250));
    }
    toast('✅ '+n+' PDF scaricati');
  }catch(e){toast('Errore PDF: '+(e.message||e));console.error(e);}
}

function buildDocPDFPage(doc,coll,item){

  y+=7;doc.setDrawColor(14,163,113);doc.setLineWidth(0.5);doc.line(M,y,W-M,y);doc.setLineWidth(0.2);y+=6;
  // Controparte
  doc.setFontSize(7.5);doc.setTextColor(110);doc.text(isForn?'FORNITORE':'CLIENTE',M,y);y+=4;
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(20);doc.text(party.nome||'',M,y);y+=5;
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(90);
  const pl=[party.via,[party.cap,party.citta,party.prov?'('+party.prov+')':''].filter(Boolean).join(' ')].filter(Boolean).join(' · ');

  const pm=[party.piva?'P.IVA '+party.piva:'',party.sdi?'SDI '+party.sdi:'',party.pec||''].filter(Boolean).join(' · ');
  if(pm){doc.text(pm,M,y);y+=4;}
  doc.setTextColor(20);y+=4;
  // Tabella righe
  const hasSc=item.righe.some(r=>scEff(r.sconto)>0);
  const hasLot=['ddt','fattureCliente','fattureFornitore'].includes(coll)&&item.righe.some(r=>r.lotto||r.scad);
  const cols=[];
  cols.push({h:'Codice',w:28,r:false,v:r=>r.cod||''});
  cols.push({h:'Descrizione',w:hasLot?40:60,r:false,v:r=>r.descr||''});
  if(hasLot){cols.push({h:'Lotto',w:22,r:false,v:r=>r.lotto||'—'});cols.push({h:'Scadenza',w:20,r:true,v:r=>r.scad?fdate(r.scad):'—'});}
  cols.push({h:'Q.tà',w:12,r:true,v:r=>String(r.qty)});

  cols.push({h:'IVA',w:10,r:true,v:r=>(r.iva||22)+'%'});

  doc.setTextColor(20);y+=8;
  // Righe
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);
  item.righe.forEach(r=>{

      const v=c.v(r);
      if(c.h==='Descrizione'){const lines=doc.splitTextToSize(v,c.w-2);doc.text(lines[0],rx,y);}
      else doc.text(v,c.r?rx+c.w-1:rx,y,{align:c.r?'right':'left'});

  });
  // Totali
  y+=5;const tx=W-M-55;

  doc.setTextColor(90);doc.text('IVA',tx,y);doc.setTextColor(20);doc.text(eur(fIva),W-M,y,{align:'right'});y+=5;
  doc.setDrawColor(14,163,113);doc.setLineWidth(0.4);doc.line(tx,y-1,W-M,y-1);doc.setLineWidth(0.2);
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(14,163,113);
  doc.text('TOTALE',tx,y+4);doc.text(eur(fTot),W-M,y+4,{align:'right'});doc.setTextColor(20);
  // Footer
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(160);

}

let ASORT={clienti:{key:'nome',dir:'asc'},fornitori:{key:'nome',dir:'asc'}};
function aSortVal(mod,c,key){
  if(mod==='clienti'){
    switch(key){
      case 'nome':return (c.nome||'').toLowerCase();
      case 'piva':return (c.piva||c.cf||'');
      case 'sede':return ((c.citta||'')+' '+(c.prov||'')).toLowerCase();
      case 'dest':return c.dest&&c.dest.length?c.dest.length:0;
      case 'term':return c.term?parseInt(c.term):-1;
      case 'sdi':return (c.sdi||c.pec||'').toLowerCase();
    }
  }else{
    switch(key){
      case 'nome':return (c.nome||'').toLowerCase();
      case 'piva':return (c.piva||c.cf||'');
      case 'sede':return ((c.citta||'')+' '+(c.prov||'')).toLowerCase();
      case 'term':return c.term?parseInt(c.term):-1;
      case 'contatti':return (c.email||c.tel||c.pec||'').toLowerCase();
    }
  }
  return '';
}

/* lineage: ricostruisce la catena dall'OC radice */
function lineage(item,coll){
  const t=coll?({ordiniCliente:'OC',ordiniFornitore:'OF',ddt:'DDT',fattureCliente:'FT',fattureFornitore:'FTF',preventivi:'PREV'})[coll]:item.num.split('/')[0];
  const fOC=n=>n?DB.ordiniCliente.find(o=>o.num===n):null;
  const fOF=n=>n?DB.ordiniFornitore.find(o=>o.num===n):null;
  const fDDT=n=>n?DB.ddt.find(d=>d.num===n):null;
  const fFT=n=>n?DB.fattureCliente.find(f=>f.num===n):null;
  const fFTF=n=>n?DB.fattureFornitore.find(f=>f.num===n):null;
  const cur=item.num;
  const node=(label,obj)=>`<div class="fnode ${obj.num===cur?'cur':''}" onclick="openByNum('${obj.num}')"><span class="fl">${label}</span><span class="fv">${obj.num}</span></div>`;
  const arrow='<span class="farrow">→</span>';
  // OC radice (se esiste)
  let ocNum=null;
  if(t==='OC')ocNum=item.num;
  else if(t==='DDT')ocNum=item.ocId;
  else if(t==='FT'){const dd=fDDT(item.ddtId);ocNum=item.ocId||(dd&&dd.ocId);}
  else if(t==='OF')ocNum=item.ocId;
  else if(t==='FTF'){const of=fOF(item.ofId);ocNum=of&&of.ocId;}
  const oc=fOC(ocNum);
  if(oc){
    const ofNums=(oc.ofIds&&oc.ofIds.length?oc.ofIds:(oc.ofId?[oc.ofId]:[]));
    const ofList=ofNums.map(fOF).filter(Boolean);
    const ddtList=(oc.ddtIds&&oc.ddtIds.length?oc.ddtIds:(oc.ddtId?[oc.ddtId]:[])).map(n=>fDDT(n)).filter(Boolean);
    const g=(label,obj)=>obj?node(label,obj):`<div class="fnode ghost"><span class="fl">${label}</span><span class="fv">— non generato</span></div>`;
    const ofRows=ofList.length?ofList.map((of,i)=>{
      const ftfList=(of.ftfIds&&of.ftfIds.length?of.ftfIds:(of.ftfId?[of.ftfId]:[])).map(n=>fFTF(n)).filter(Boolean);
      const ftfNodes=ftfList.length?ftfList.map((f,j)=>node('Fattura fornitore'+(ftfList.length>1?' '+(j+1):''),f)).join(arrow):g('Fattura fornitore',null);
      return `<div class="flow-row">${node('Ordine fornitore'+(ofList.length>1?' '+(i+1):''),of)}${arrow}${ftfNodes}</div>`;
    }).join(''):`<div class="flow-row">${g('Ordine fornitore',null)}${arrow}${g('Fattura fornitore',null)}</div>`;
    const ddtRows=ddtList.length?ddtList.map((d,i)=>`<div class="flow-row">${node('DDT'+(ddtList.length>1?' '+(i+1):''),d)}${arrow}${d.ftId?node('Fattura cliente',fFT(d.ftId)):g('Fattura cliente',null)}</div>`).join(''):`<div class="flow-row">${g('DDT',null)}${arrow}${g('Fattura cliente',null)}</div>`;
    return `<div class="flow"><div class="flow-row">
      ${node('Ordine cliente',oc)}${arrow}
      <div class="fbranch">
        ${ofRows}
        ${ddtRows}
      </div>
    </div></div>`;
  }
  // senza ordine cliente radice: mostra comunque lo schema del lato pertinente
  const ghost=(label)=>`<div class="fnode ghost"><span class="fl">${label}</span><span class="fv">— non generato</span></div>`;
  if(t==='OF'||t==='FTF'){
    const of=t==='OF'?item:fOF(item.ofId);
    if(of){
      const ftfList=(of.ftfIds&&of.ftfIds.length?of.ftfIds:(of.ftfId?[of.ftfId]:[])).map(n=>fFTF(n)).filter(Boolean);
      const ftfNodes=ftfList.length?ftfList.map((f,i)=>node('Fattura fornitore'+(ftfList.length>1?' '+(i+1):''),f)).join(arrow):ghost('Fattura fornitore');
      return `<div class="flow"><div class="flow-row">${node('Ordine fornitore',of)}${arrow}${ftfNodes}</div></div>`;
    }
    if(t==='FTF')return '<div class="flow"><span class="t-mut">Fattura non collegata a un ordine fornitore. Usa il pulsante “🔗 Collega a ordine fornitore” per mostrare la filiera.</span></div>';
  }
  let chain=[];
  if(t==='DDT'||t==='FT'){
    const ddt=t==='DDT'?item:fDDT(item.ddtId);
    const ft=t==='FT'?item:(ddt?fFT(ddt.ftId):null);
    if(ddt)chain.push(['DDT',ddt]);
    if(ft)chain.push(['Fattura cliente',ft]);
  }
  if(chain.length<2)return '<div class="flow"><span class="t-mut">Nessun altro documento collegato.</span></div>';
  return `<div class="flow"><div class="flow-row">${chain.map(c=>node(c[0],c[1])).join(arrow)}</div></div>`;
}

// Individua le righe dell'ordine cliente non ancora presenti su nessun ordine fornitore collegato, le raggruppa per fornitore
// (fornitore indicato sulla scheda prodotto, altrimenti l'ultimo acquisto registrato per ciascun codice) e crea/aggiorna gli ordini fornitore di conseguenza.
// Può essere richiamata più volte sullo stesso ordine cliente: ogni volta elabora solo i codici ancora mancanti.
function genOFFromOC(oc){
  const ofNums=(oc.ofIds&&oc.ofIds.length?oc.ofIds:(oc.ofId?[oc.ofId]:[]));
  const existingOFs=ofNums.map(n=>DB.ordiniFornitore.find(o=>o.num===n)).filter(Boolean);
  const covered=new Set();existingOFs.forEach(of=>of.righe.forEach(r=>covered.add(r.cod)));
  const missing=oc.righe.filter(r=>!covered.has(r.cod));
  if(!missing.length)return{created:[],updated:[]};
  const groups=new Map();
  missing.forEach(r=>{
    const prod=allProdotti().find(x=>x.codice===r.cod);
    const la=lastAcqPrice(r.cod);
    const fid=(prod&&prod.fornitoreId)||(la&&la.fornitoreId)||'f1';
    const line=la?{cod:r.cod,descr:r.descr,qty:r.qty,prezzo:la.prezzo,sconto:la.sconto||0,iva:r.iva}:{cod:r.cod,descr:r.descr,qty:r.qty,prezzo:r.prezzo,sconto:r.sconto||0,iva:r.iva};
    if(!groups.has(fid))groups.set(fid,[]);
    groups.get(fid).push(line);
  });
  const created=[],updated=[];
  for(const [fid,righe] of groups){
    const target=existingOFs.find(o=>o.fornitoreId===fid);
    if(target){target.righe.push(...righe);updated.push(target);}
    else{const of={id:uid('of'),num:nextNum('OF'),data:today(),fornitoreId:fid,righe,ocId:oc.num,ftfId:null,ftfIds:[]};DB.ordiniFornitore.push(of);created.push(of);}
  }
  if(created.length){oc.ofIds=[...(oc.ofIds||[]),...created.map(o=>o.num)];oc.ofId=oc.ofIds[oc.ofIds.length-1];}
  return{created,updated};
}
async function genOF(id){const oc=DB.ordiniCliente.find(o=>o.id===id);if(!oc)return;
  const {created,updated}=genOFFromOC(oc);
  if(!created.length&&!updated.length){toast('Tutti gli articoli dell\'ordine sono già su un ordine fornitore');return;}
  await persist();
  const parts=[];
  if(created.length)parts.push(created.length>1?('creati '+created.length+' ordini fornitore: '+created.map(o=>fornitore(o.fornitoreId).nome+' '+o.num).join(', ')):('creato ordine fornitore '+created[0].num+' ('+fornitore(created[0].fornitoreId).nome+')'));
  if(updated.length)parts.push('aggiornato/i con i nuovi articoli: '+updated.map(o=>o.num).join(', '));
  toast(parts.join(' · '));
  const first=created[0]||updated[0];
  MOD='of';SEL={coll:'ordiniFornitore',item:first};render();document.getElementById('content').scrollTo(0,0);openOFEdit(first.id);}
// Cerca lotto/scadenza per un codice prodotto tra le fatture fornitore collegate a un ordine fornitore
function lotScadFromOF(ofNums,cod){
  if(!ofNums||!cod)return null;
  const list=Array.isArray(ofNums)?ofNums:[ofNums];
  for(const ofNum of list){
    const of=DB.ordiniFornitore.find(o=>o.num===ofNum);if(!of)continue;
    const nums=(of.ftfIds&&of.ftfIds.length)?of.ftfIds:(of.ftfId?[of.ftfId]:[]);
    if(!nums.length)continue;

}

// Segna come ricevute sull'ordine fornitore le quantità di una fattura fornitore collegata (usata da import XML, collegamento manuale, ecc.)
function markOFReceived(of,righe){
  if(!of||!righe)return;
  righe.forEach(r=>{
    let ofr=of.righe.find(x=>x.cod===r.cod);
    if(!ofr){ofr={cod:r.cod,descr:r.descr,qty:r.qty,prezzo:r.prezzo,sconto:r.sconto||0,iva:r.iva,qtyEv:0};of.righe.push(ofr);}
    ofr.qtyEv=Math.min(ofr.qty,(ofr.qtyEv||0)+r.qty);
  });
}
// Segna come fatturate (non necessariamente arrivate/consegnate) le quantità di una fattura fornitore collegata
function markOFInvoiced(of,righe){
  if(!of||!righe)return;
  righe.forEach(r=>{
    let ofr=of.righe.find(x=>x.cod===r.cod);
    if(!ofr){ofr={cod:r.cod,descr:r.descr,qty:r.qty,prezzo:r.prezzo,sconto:r.sconto||0,iva:r.iva,qtyFatt:0};of.righe.push(ofr);}
    ofr.qtyFatt=Math.min(ofr.qty,(ofr.qtyFatt||0)+r.qty);
  });
}
// Scala le quantità sull'ordine fornitore collegato all'OC
function updateOFfromOC(ocNum,righeConsegnate){
  const oc=DB.ordiniCliente.find(o=>o.num===ocNum);if(!oc)return;
  const ofNums=(oc.ofIds&&oc.ofIds.length?oc.ofIds:(oc.ofId?[oc.ofId]:[]));
  const ofs=ofNums.map(n=>DB.ordiniFornitore.find(o=>o.num===n)).filter(Boolean);
  if(!ofs.length)return;
  let added=false;
  righeConsegnate.forEach(dr=>{
    let target=null,ofr=null;
    for(const of of ofs){const r=of.righe.find(x=>x.cod===dr.cod);if(r){target=of;ofr=r;break;}}
    if(!ofr){
      // Prodotto non presente su nessun ordine fornitore collegato (es. aggiunto sull'OC dopo aver generato gli OF): lo aggiungiamo al fornitore giusto (o al primo OF se ignoto)
      const prod=allProdotti().find(x=>x.codice===dr.cod);
      const la=lastAcqPrice(dr.cod);
      const fid=(prod&&prod.fornitoreId)||(la&&la.fornitoreId);
      target=(fid&&ofs.find(o=>o.fornitoreId===fid))||ofs[0];
      ofr={cod:dr.cod,descr:dr.descr,qty:dr.qty,prezzo:la?la.prezzo:dr.prezzo,sconto:la?(la.sconto||0):0,iva:dr.iva,qtyEv:0};
      target.righe.push(ofr);added=true;
    }
    ofr.qtyEv=Math.min(ofr.qty,(ofr.qtyEv||0)+dr.qty);
  });
  if(added)toast('Ordine fornitore aggiornato con nuovi prodotti dall\'ordine cliente');
}

function askConfirm(msg,fn){

  document.getElementById('overlay').classList.add('show');
}
function doConfirm(){const fn=PENDING;PENDING=null;closeModal();if(fn)fn();}

function removeDoc(coll,id){
  const it=DB[coll].find(x=>x.id===id);if(!it)return;
  if(coll==='ordiniCliente'&&((it.ofIds&&it.ofIds.length)||it.ofId||(it.ddtIds&&it.ddtIds.length)||it.ddtId||it.ftId)){toast('Elimina prima i documenti collegati (OF / DDT / Fattura)');return;}
  if(coll==='ordiniFornitore'&&((it.ftfIds&&it.ftfIds.length)||it.ftfId)){toast('Elimina prima le fatture fornitore collegate');return;}
  if(coll==='ddt'&&it.ftId){toast('Elimina prima la fattura collegata');return;}
  const tipo={ordiniCliente:'l\'ordine cliente',ordiniFornitore:'l\'ordine fornitore',ddt:'il DDT',fattureCliente:'la fattura',fattureFornitore:'la fattura fornitore'}[coll];
  askConfirm(`Vuoi eliminare definitivamente ${tipo} <b>${it.num}</b>?<br>L'operazione non è reversibile.`,()=>doRemove(coll,id));
}
async function doRemove(coll,id){
  const it=DB[coll].find(x=>x.id===id);if(!it)return;
  // azzera il riferimento sul documento padre
  if(coll==='ordiniFornitore'){const oc=DB.ordiniCliente.find(o=>o.num===it.ocId);if(oc){oc.ofIds=(oc.ofIds||[]).filter(n=>n!==it.num);if(oc.ofId===it.num)oc.ofId=oc.ofIds.length?oc.ofIds[oc.ofIds.length-1]:null;}}
  if(coll==='ddt'){const oc=DB.ordiniCliente.find(o=>o.num===it.ocId);if(oc){
    it.righe.forEach(dr=>{const ln=oc.righe.find(x=>x.cod===dr.cod);if(ln)ln.qtyEv=Math.max(0,(ln.qtyEv||0)-dr.qty);});
    oc.ddtIds=(oc.ddtIds||[]).filter(n=>n!==it.num);
    oc.ddtId=oc.ddtIds.length?oc.ddtIds[oc.ddtIds.length-1]:null;
  }}
  if(coll==='fattureCliente'){const ddt=DB.ddt.find(d=>d.num===it.ddtId);if(ddt)ddt.ftId=null;const oc=DB.ordiniCliente.find(o=>o.num===it.ocId);if(oc)oc.ftId=null;}
  if(coll==='fattureFornitore'){const of=DB.ordiniFornitore.find(o=>o.num===it.ofId);if(of){
    it.righe.forEach(fr=>{const ln=of.righe.find(x=>x.cod===fr.cod);if(ln)ln.qtyEv=Math.max(0,(ln.qtyEv||0)-fr.qty);});
    of.ftfIds=(of.ftfIds||[]).filter(n=>n!==it.num);
    of.ftfId=of.ftfIds.length?of.ftfIds[of.ftfIds.length-1]:null;
  }}
  DB[coll]=DB[coll].filter(x=>x.id!==id);
  await persist();toast(it.num+' eliminato');SEL=null;render();
}

let PROD_IDX=-1;
function prodKeyNav(e){
  const el=document.getElementById('prodsugg');
  if(e.key==='Enter'){
    e.preventDefault();
    e.stopPropagation();
    const raw=(document.getElementById('prodq')||{}).value||'';
    const qNorm=raw.trim();
    const items=el?el.querySelectorAll('.sugg-item'):[];
    const exact=qNorm&&allProdotti().find(x=>(x.codice||'').toLowerCase()===qNorm.toLowerCase());
    if(exact){addProdToOrder(exact.codice);PROD_IDX=-1;return;}
    if(PROD_IDX>=0&&items[PROD_IDX]){const cod=items[PROD_IDX].dataset.cod;if(cod)addProdToOrder(cod);PROD_IDX=-1;}
    else if(items.length===1){const cod=items[0].dataset.cod;if(cod)addProdToOrder(cod);}
    return;
  }
  if(!el)return;
  const items=el.querySelectorAll('.sugg-item');if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();PROD_IDX=Math.min(PROD_IDX+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();PROD_IDX=Math.max(PROD_IDX-1,0);}
  else if(e.key==='Escape'){el.innerHTML='';PROD_IDX=-1;return;}
  else return;
  items.forEach((it,i)=>it.style.background=i===PROD_IDX?'var(--surface2)':'');
  if(PROD_IDX>=0)items[PROD_IDX].scrollIntoView({block:'nearest'});
}
function addProdToOrder(cod){

    const cliId=(document.getElementById('f-cli')||{}).value;
    const last=cliId?lastClientPrice(cliId,cod):null;
    FR.push({cod:p.codice,descr:p.descrizione,qty:1,prezzo:last?last.prezzo:(p.ven||0),sconto:last?last.sconto:0,iva:p.iva||22,_last:!!last});
  }
  const q=document.getElementById('prodq');if(q){q.value='';q.focus();}

  PROD_IDX=-1;

  }
}

/* ===== Form prodotto (nuovo / modifica) ===== */
let LISTINO={cols:[],rows:[]};
function loadXLSX(){return new Promise((res,rej)=>{if(window.XLSX){res(window.XLSX);return;}const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=()=>res(window.XLSX);s.onerror=()=>rej(new Error('Impossibile caricare il lettore Excel (serve internet)'));document.head.appendChild(s);});}
function listinoNum(v){if(v==null||v==='')return 0;v=String(v).trim().replace(/[^0-9,.\-]/g,'');if(v.indexOf(',')>-1&&v.indexOf('.')>-1)v=v.replace(/\./g,'').replace(',','.');else if(v.indexOf(',')>-1)v=v.replace(',','.');return parseFloat(v)||0;}
function listinoIsNum(v){v=String(v==null?'':v).trim();return v!==''&&/^[\d.,\s%€]+$/.test(v);}
function colLetter(i){let s='';i++;while(i>0){const m=(i-1)%26;s=String.fromCharCode(65+m)+s;i=Math.floor((i-1)/26);}return s;}
function parseCSVToAoa(text){
  text=text.replace(/\r\n?/g,'\n');const lines=text.split('\n');if(!lines.length)return[];
  const first=lines.find(l=>l.length)||'';const delim=(first.split(';').length>first.split(',').length)?';':',';
  const pl=l=>{const out=[];let cur='',q=false;for(let i=0;i<l.length;i++){const c=l[i];if(q){if(c==='"'){if(l[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}else{if(c==='"')q=true;else if(c===delim){out.push(cur);cur='';}else cur+=c;}}out.push(cur);return out;};
  return lines.filter(l=>l.length).map(l=>pl(l).map(c=>String(c).trim()));
}
async function listinoParse(file){
  const name=(file.name||'').toLowerCase();
  if(name.endsWith('.csv')||file.type==='text/csv')return parseCSVToAoa(await file.text());
  const XLSX=await loadXLSX();const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
  return aoa.map(r=>r.map(c=>String(c==null?'':c).trim()));
}
function listinoBuild(aoa){
  // trova riga intestazione (contiene 'codice') o prima riga con >=2 celle piene
  let hi=-1;
  for(let i=0;i<Math.min(aoa.length,25);i++){if(aoa[i].some(c=>/codice|cod\.?$|articol/i.test(c))){hi=i;break;}}
  if(hi<0)for(let i=0;i<Math.min(aoa.length,25);i++){if(aoa[i].filter(c=>c!=='').length>=2){hi=i;break;}}
  if(hi<0)hi=0;
  const header=aoa[hi]||[];const rows=aoa.slice(hi+1).filter(r=>r.some(c=>c!==''));
  const width=Math.max(header.length,...rows.map(r=>r.length),0);
  const cols=[];for(let i=0;i<width;i++){let sample='';for(let k=0;k<rows.length&&k<12;k++){if(rows[k][i]&&rows[k][i]!==''){sample=rows[k][i];break;}}cols.push({idx:i,header:(header[i]||'').trim(),sample});}
  return{cols,rows};
}
function listinoColGuess(cols,re,numeric){
  const cands=cols.filter(c=>re.test(c.header)||(c.header===''&&numeric&&listinoIsNum(c.sample)));
  if(numeric){const n=cands.find(c=>listinoIsNum(c.sample));if(n)return n.idx;}
  return cands.length?cands[0].idx:'';
}
function openListinoImport(){
  LISTINO={cols:[],rows:[]};
  document.getElementById('modal').innerHTML=`
   <div class="modal-head"><h3>Carica listino prodotti</h3><button class="x" onclick="closeModal()">×</button></div>
   <div class="modal-body" id="listino-body" style="max-height:66vh;overflow-y:auto">
     <p class="ai-intro">Carica un file <b>CSV</b> o <b>Excel</b> (.xlsx/.xls). Poi abbini le colonne guardando l'esempio mostrato; i prodotti vengono aggiunti o aggiornati per <b>codice</b>.</p>
     <div class="field"><label>File listino</label><input id="listino-file" class="ai-file-input" type="file" accept=".csv,.xlsx,.xls" onchange="listinoOnFile(this)"></div>
     <div id="listino-step"></div>
   </div>
   <div class="modal-foot"><button class="btn ghost" style="border:1px solid var(--border2)" onclick="closeModal()">Chiudi</button></div>`;
  document.getElementById('overlay').classList.add('show');
}
async function listinoOnFile(inp){
  const f=inp.files&&inp.files[0];if(!f)return;
  const step=document.getElementById('listino-step');step.innerHTML='<div class="ai-msg">Sto leggendo il file…</div>';
  try{const aoa=await listinoParse(f);const {cols,rows}=listinoBuild(aoa);
    if(!cols.length||!rows.length){step.innerHTML='<div class="ai-err">Non ho trovato righe valide nel file.</div>';return;}
    LISTINO={cols,rows};listinoRenderMap();
  }catch(e){step.innerHTML='<div class="ai-err">Errore lettura file.<br><span class="ai-x">'+aiEsc(e.message||e)+'</span></div>';}
}
function listinoRenderMap(){

function parseFatturaXML(xml){
  let doc;try{doc=new DOMParser().parseFromString(xml,'text/xml');}catch(e){return null;}

  const G=(root,name)=>{if(!root)return null;const e=root.getElementsByTagNameNS('*',name);return e.length?e[0]:null;};
  const GA=(root,name)=>root?[...root.getElementsByTagNameNS('*',name)]:[];
  const T=(root,name)=>{const e=G(root,name);return e?e.textContent.trim():'';};
  const partyOf=el=>{if(!el)return{nome:'',piva:'',cf:''};const idf=G(el,'IdFiscaleIVA');return{nome:T(el,'Denominazione')||[T(el,'Nome'),T(el,'Cognome')].filter(Boolean).join(' '),piva:idf?T(idf,'IdCodice'):'',cf:T(el,'CodiceFiscale')};};
  const ced=partyOf(G(doc,'CedentePrestatore'));
  const ces=partyOf(G(doc,'CessionarioCommittente'));
  const body=G(doc,'FatturaElettronicaBody');if(!body)return null;
  const dgd=G(body,'DatiGeneraliDocumento');
  const number=T(dgd,'Numero');const date=T(dgd,'Data');
  let order_ref='';const ord=G(body,'DatiOrdineAcquisto');if(ord)order_ref=T(ord,'IdDocumento');
  const lines=GA(body,'DettaglioLinee').map(dl=>{
    const ca=G(dl,'CodiceArticolo');
    let lotto='',scad='';
    GA(dl,'AltriDatiGestionali').forEach(adg=>{
      const tipo=(T(adg,'TipoDato')||'').toUpperCase();
      if(tipo.includes('LOTTO')||tipo.includes('PARTITA'))lotto=T(adg,'RiferimentoTesto')||lotto;
      if(tipo.includes('SCAD'))scad=T(adg,'RiferimentoData')||T(adg,'RiferimentoTesto')||scad;
    });
    return{cod:ca?T(ca,'CodiceValore'):'',descr:T(dl,'Descrizione'),qty:xmlNum(T(dl,'Quantita'))||1,prezzo:xmlNum(T(dl,'PrezzoUnitario')),iva:xmlNum(T(dl,'AliquotaIVA')),lotto,scad};
  });
  const totale=xmlNum(T(dgd,'ImportoTotaleDocumento'));
  const az=DB.azienda||{};const ap=(az.piva||'').replace(/\D/g,'');
  const ourP=(ced.piva||'').replace(/\D/g,'');
  const dir=(ap&&ourP&&ourP===ap)?'vendita':'acquisto';
  return{dir,ced,ces,number,date,order_ref,lines,totale};
}

async function aiComplete(sys,userText,file,maxTok){
  const az=DB.azienda||{};const prov=az.aiProvider||'claude';
  let b64=null,mt=null;
  if(file){b64=await aiFileB64(file);mt=file.type||(/\.pdf$/i.test(file.name)?'application/pdf':'image/jpeg');}
  let txt='';
  if(prov==='openai'){
    const base=(az.aiBase||'').trim().replace(/\/+$/,'');if(!base)throw new Error("Imposta l'indirizzo (Base URL) nelle Impostazioni AI");
    const model=(az.aiModel||'').trim()||'llama3.1';const headers={"Content-Type":"application/json"};if(az.aiOkey)headers["Authorization"]="Bearer "+az.aiOkey;
    let content=userText;
    if(file){if(mt==='application/pdf'){const imgs=await aiPdfToImages(file,12);if(!imgs.length)throw new Error('PDF vuoto o non leggibile');content=[{type:"text",text:userText}].concat(imgs.map(u=>({type:"image_url",image_url:{url:u}})));}else content=[{type:"text",text:userText},{type:"image_url",image_url:{url:"data:"+mt+";base64,"+b64}}];}
    const res=await fetch(base+"/chat/completions",{method:"POST",headers,body:JSON.stringify({model,temperature:0,max_tokens:maxTok||2500,messages:[{role:"system",content:sys},{role:"user",content}]})});
    if(!res.ok)throw new Error('HTTP '+res.status);const data=await res.json();txt=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'';
  }else{
    const headers={"Content-Type":"application/json"};const key=prov==='claudekey'?(az.aiKey||'').trim():'';
    if(key){headers["x-api-key"]=key;headers["anthropic-version"]="2023-06-01";headers["anthropic-dangerous-direct-browser-access"]="true";}
    let content;
    if(file){const blk=mt==='application/pdf'?{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}:{type:"image",source:{type:"base64",media_type:mt,data:b64}};content=[blk,{type:"text",text:userText}];}else content=userText;
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers,body:JSON.stringify({model:"claude-sonnet-4-5-20250929",max_tokens:maxTok||2500,system:sys,messages:[{role:"user",content}]})});
    const data=await res.json();
    if(!res.ok)throw new Error((data&&data.error&&data.error.message)||('HTTP '+res.status));
    txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  }
  txt=String(txt).replace(/```json|```/g,'').trim();
  let plan;try{plan=JSON.parse(txt);}catch(_){let src=txt;const m=txt.match(/[\[\{][\s\S]*[\]\}]/);if(m)src=m[0];try{plan=JSON.parse(src);}catch(_2){src=src.replace(/,\s*([\]\}])/g,'$1');try{plan=JSON.parse(src);}catch(_3){plan=null;}}}
  if(!plan)throw new Error('risposta non interpretabile'+(txt?' — ricevuto: '+txt.slice(0,300):' (risposta vuota, controlla chiave/modello nelle Impostazioni AI)'));
  return plan;
}

/* ===== Import automatico fatture fornitore da Gmail =====
   Un Google Apps Script separato (vedi apps-script/gmail-import.gs) legge periodicamente la posta
   con oggetto "POSTA CERTIFICATA: Trasmissione Fattura", estrae i dati con l'AI e li scrive "in attesa"
   nel file gmail-pending.json di questo repository. Qui il gestionale si limita a leggere quel file
   (con lo stesso token GitHub già usato per il backup) e a proporre l'importazione con la stessa
   schermata di conferma dell'import manuale: nulla viene scritto in archivio senza conferma dell'utente.
   Il file gmail-pending.json è volutamente separato da backup.json per non rischiare di sovrascrivere
   i tuoi dati veri durante il salvataggio automatico del gestionale. */
const GMAIL_PENDING_FILE='gmail-pending.json';
let GMAIL_TIMER=null,GMAIL_PENDING=null,GMAIL_PENDING_SHA=null,GMAIL_NEW_COUNT=0;
async function ghContentsGet(path){
  const tok=ghToken();if(!tok)return null;
  if(!GH_USER){const ok=await ghInit();if(!ok)return null;}
  try{
    const r=await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${path}`,
      {headers:{Authorization:'token '+tok,'User-Agent':'Ipsofarma-CRM'}});
    if(r.status===404)return{sha:null,data:null};
    if(!r.ok)return null;
    const d=await r.json();
    return{sha:d.sha,data:JSON.parse(fromB64(d.content))};
  }catch(e){return null;}
}
async function ghContentsPut(path,obj,sha){
  const tok=ghToken();if(!tok)return false;
  const body={message:'Aggiorna '+path,content:toB64(JSON.stringify(obj,null,2)),branch:'main'};
  if(sha)body.sha=sha;
  try{
    const r=await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${path}`,
      {method:'PUT',headers:{Authorization:'token '+tok,'User-Agent':'Ipsofarma-CRM','Content-Type':'application/json'},body:JSON.stringify(body)});
    return r.ok;
  }catch(e){return false;}
}
async function gmailSync(interactive){
  if(!interactive&&GMAIL_PENDING&&GMAIL_PENDING.length)return;
  if(!ghToken()){if(interactive)toast('Configura prima il token GitHub nelle Impostazioni (serve anche per Gmail)');return;}
  const res=await ghContentsGet(GMAIL_PENDING_FILE);
  if(!res){if(interactive)toast('Errore nel controllo delle fatture in attesa da Gmail');return;}
  const items=(res.data&&res.data.items)||[];
  if(!items.length){GMAIL_PENDING=null;GMAIL_PENDING_SHA=null;GMAIL_NEW_COUNT=0;renderNav();if(interactive)toast('Nessuna fattura in attesa da Gmail');return;}
  GMAIL_PENDING=items;GMAIL_PENDING_SHA=res.sha;
  GMAIL_NEW_COUNT=items.filter(it=>it.p&&it.p.dir==='acquisto'&&!DB.fattureFornitore.some(f=>String(f.num)===String(it.p.number))).length;
  renderNav();
  if(interactive){XMLIMP={items};openGmailReview();}
  else if(GMAIL_NEW_COUNT>0){gsPlayAlert();toast('📥 '+GMAIL_NEW_COUNT+' fattura/e in attesa da Gmail — apri "Fatture fornitore" per importarle');}
}

// Google, per le risposte di errore (es. foglio non pubblico), ignora il nostro
// responseHandler e chiama sempre google.visualization.Query.setResponse: lo intercettiamo
// qui per dare un messaggio chiaro invece di un timeout generico.
let GS_PENDING=null;
window.google=window.google||{};
window.google.visualization=window.google.visualization||{};
window.google.visualization.Query=window.google.visualization.Query||{};
window.google.visualization.Query.setResponse=function(resp){if(typeof GS_PENDING==='function')GS_PENDING(resp);};
function gsFetchRows(sheetId){
  return new Promise((resolve,reject)=>{
    const cbName='__gsCb'+Date.now()+Math.floor(Math.random()*1e6);
    const timeout=setTimeout(()=>{cleanup();reject(new Error('Tempo scaduto: il foglio non ha risposto. Controlla che sia condiviso come "Chiunque abbia il link".'));},15000);
    function cleanup(){clearTimeout(timeout);delete window[cbName];GS_PENDING=null;if(script.parentNode)script.parentNode.removeChild(script);}
    function handle(resp){
      cleanup();
      try{
        if(!resp||resp.status==='error'){
          const m=(resp&&resp.errors&&resp.errors[0]&&resp.errors[0].detailed_message)||'';
          reject(new Error('Il foglio non è accessibile'+(m?' ('+m+')':'')+'. Vai su Google Sheets → Condividi → imposta "Chiunque abbia il link" come Visualizzatore, sul foglio giusto.'));
          return;
        }
        const cols=(resp.table.cols||[]).map(c=>(c.label||'').trim());
        const rows=(resp.table.rows||[]).map(r=>{
          const o={};cols.forEach((c,i)=>{const cell=r.c&&r.c[i];o[c]=cell?(cell.f!=null?cell.f:cell.v):'';});
          return o;
        });
        resolve({cols,rows});
      }catch(e){reject(e);}
    }
    window[cbName]=handle;
    GS_PENDING=handle;
    const script=document.createElement('script');
    script.src='https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?tqx=out:json;responseHandler:'+cbName;
    script.onerror=()=>{cleanup();reject(new Error('Foglio non raggiungibile. Controlla che sia condiviso come "Chiunque abbia il link".'));};
    document.body.appendChild(script);
  });
}
function gsCol(cols,keywords){
  const lc=cols.map(c=>c.toLowerCase());
  for(const kw of keywords){const i=lc.findIndex(c=>c.includes(kw));if(i>=0)return cols[i];}
  return null;
}
function gsParseProdotti(text){
  return String(text||'').split(/\n|;/).map(l=>l.trim()).filter(Boolean).map(l=>{
    let m=l.match(/^(.+?)\s*[x×X\*]\s*(\d+)\s*$/);
    if(!m)m=l.match(/^(.+?)\s*[-–]\s*(\d+)\s*$/);
    if(!m)m=l.match(/^(.+?)\s+(\d+)\s*$/);
    const cod=(m?m[1]:l).trim();const qty=m?Math.max(1,parseInt(m[2])):1;
    return{raw:l,cod,qty,p:aiFindProd(cod)};
  });
}
function gsMatchClient(name){
  name=(name||'').trim();if(!name)return null;
  const n=aiNorm(name);
  return DB.clienti.find(x=>aiNorm(x.nome)===n)
    ||DB.clienti.find(x=>aiNorm(x.nome).includes(n)||n.includes(aiNorm(x.nome)))
    ||DB.clienti.find(x=>aiNorm(x.nome).split(' ')[0]===n.split(' ')[0])||null;
}
function gsMatchDest(cliente,destText){
  if(!cliente||!cliente.dest||!cliente.dest.length)return null;
  const n=aiNorm((destText||'').trim());if(!n)return null;
  return cliente.dest.find(d=>aiNorm(d.nome||'')===n||aiNorm(d.citta||'')===n)
    ||cliente.dest.find(d=>aiNorm(d.nome||'').includes(n)||n.includes(aiNorm(d.nome||''))||aiNorm(d.citta||'').includes(n)||n.includes(aiNorm(d.citta||'')))
    ||null;
}

async function delProdotto(codice){

}

function exportDB(){
  try{
    const out=Object.assign({},DB,{prodotti:allProdotti()});
    const blob=new Blob([JSON.stringify(out)],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='ipsofarma-backup-'+today()+'.json';document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);toast('Backup completo esportato · '+allProdotti().length+' prodotti inclusi');
  }catch(e){toast('Esportazione non riuscita');}
}
async function importDB(input){
  const file=input.files&&input.files[0];if(!file){return;}
  let data;
  try{data=JSON.parse(await file.text());}catch(e){toast('File non leggibile');input.value='';return;}
  if(!data||!Array.isArray(data.fattureFornitore)||!Array.isArray(data.fornitori)){toast('File di backup non valido');input.value='';return;}
  input.value='';
  askConfirm('Importare il backup <b>'+file.name+'</b>?<br>I dati attualmente presenti verranno sostituiti con quelli del backup.',async()=>{
    DB=data;_allProd=null;await ensureSchema();await persist();toast('Backup importato · '+(DB.prodotti?DB.prodotti.length:0)+' prodotti');MOD='dashboard';SEL=null;render();
  });
}

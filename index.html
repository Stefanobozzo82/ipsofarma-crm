function togglePrintMenu(ev){
  ev.stopPropagation();
  const m=document.getElementById('printMenu');if(!m)return;
  if(m.classList.contains('show')){m.classList.remove('show');return;}
  // Posizionato via JS (invece che ancorato col solo CSS) perché il pulsante può trovarsi
  // vicino al bordo destro o sinistro a seconda dello schermo: così il menu resta sempre visibile.
  const btn=ev.currentTarget.getBoundingClientRect();
  const mw=230,mh=90;
  let left=Math.max(8,Math.min(btn.right-mw,window.innerWidth-mw-8));
  let top=btn.bottom+6;
  if(top+mh>window.innerHeight-8)top=Math.max(8,btn.top-mh-6);
  m.style.left=left+'px';
  m.style.top=top+'px';
  m.classList.add('show');
}
function closePrintMenu(){const m=document.getElementById('printMenu');if(m)m.classList.remove('show');}
document.addEventListener('pointerdown',e=>{if(!e.target.closest('.print-menu-wrap'))closePrintMenu();},true);
function printDoc(coll,id){
  const it=DB[coll].find(x=>x.id===id);if(!it)return;
  document.getElementById('printArea').innerHTML=buildPrintHTML(coll,it);
  window.print();
}
function buildPrintHTML(coll,it){
  const az=DB.azienda||{};
  const isForn=(coll==='ordiniFornitore'||coll==='fattureFornitore');
  const p=isForn?fornitore(it.fornitoreId):cliente(it.clienteId);
  const titles={ordiniCliente:'ORDINE CLIENTE',ordiniFornitore:'ORDINE A FORNITORE',ddt:'DOCUMENTO DI TRASPORTO',fattureCliente:'FATTURA',fattureFornitore:'FATTURA FORNITORE',preventivi:'PREVENTIVO'};
  const azLine=[az.via,`${az.cap||''} ${az.citta||''}${az.prov?' ('+az.prov+')':''}`.trim()].filter(Boolean).join('<br>');
  const azMeta=[az.piva?'P.IVA '+az.piva:'',az.cf&&az.cf!==az.piva?'C.F. '+az.cf:'',az.tel?'Tel '+az.tel:'',az.email||'',az.pec?'PEC '+az.pec:'',az.web||''].filter(Boolean).join(' · ');
  const pAddr=[p.via,`${p.cap||''} ${p.citta||''}${p.prov?' ('+p.prov+')':''}`.trim()].filter(Boolean).join('<br>');
  const _dst=docDest(it,p);
  const _dstAddr=_dst?[_dst.via,`${_dst.cap||''} ${_dst.citta||''}${_dst.prov?' ('+_dst.prov+')':''}`.trim()].filter(Boolean).join('<br>'):'';
  const shipBlock=_dst?`<div class="pa-party pa-ship"><div class="pa-pl">Luogo di consegna</div><div class="pa-pn">${_dst.nome||p.nome}</div><div class="pa-pa">${_dstAddr}</div></div>`:'';
  // Se c'è un riquadro separato con la destinazione di consegna, il riquadro del cliente
  // deve indicare solo il destinatario (altrimenti i due riquadri si contraddicono, entrambi
  // etichettati "luogo di consegna" ma con indirizzi diversi).
  const partyLabel=isForn?'Spettabile fornitore':(coll==='ddt'?(_dst?'Destinatario':'Destinatario / luogo di consegna'):'Spettabile cliente');
  const pMeta=[p.piva?'P.IVA '+p.piva:'',p.cf&&p.cf!==p.piva?'C.F. '+p.cf:'',p.sdi?'Cod. SDI '+p.sdi:'',p.pec?'PEC '+p.pec:''].filter(Boolean).join('<br>');
  const hasSc=it.righe.some(r=>scEff(r.sconto)>0);
  const hasLot=['ddt','fattureCliente','fattureFornitore'].includes(coll)&&it.righe.some(r=>r.lotto||r.scad);
  const rows=it.righe.map(r=>`<tr><td>${r.cod}</td><td>${r.descr}</td>${hasLot?`<td>${r.lotto||'—'}</td><td class="r">${r.scad?fdate(r.scad):'—'}</td>`:''}<td class="r">${r.qty}</td><td class="r">${eur(r.prezzo)}</td><td class="r">${eur(lineNet(r))}</td>${hasSc?`<td class="r">${scLabel(r.sconto)}</td>`:''}<td class="r">${r.iva}%</td><td class="r">${eur(lineNet(r)*(1+(r.iva||22)/100))}</td></tr>`).join('');
  let ddtBlock='';
  if(coll==='ddt')ddtBlock=`<table class="pa-info"><tr><td><b>Causale del trasporto</b><br>Vendita</td><td><b>Trasporto a cura di</b><br>Mittente</td><td><b>Porto</b><br>Franco</td><td><b>Aspetto dei beni</b><br>Colli n. ____</td></tr></table>`;
  let note='';
  if(coll==='fattureCliente'){
    if(p.split==='si')note+='<div class="pa-note">Operazione soggetta a scissione dei pagamenti — art. 17‑ter DPR 633/72. IVA versata dall\'ente acquirente.</div>';
    const term=p.term?`Pagamento: ${p.pag||'Bonifico'} a ${p.term} gg`:'';
    const iban=az.iban?` · IBAN ${az.iban}`:'';
    if(term||iban)note+=`<div class="pa-note">${term}${iban}</div>`;
    note+='<div class="pa-foot-note">Documento privo di valore fiscale se non trasmesso allo SDI tramite il sistema di fatturazione elettronica.</div>';
  }
  return `<div class="pa-doc">
    <div class="pa-head">
      <div><div class="pa-az">${az.nome||'Ipsofarma S.r.l.'}</div><div class="pa-azl">${azLine}</div><div class="pa-azm">${azMeta}</div></div>
      <div class="pa-docbox"><div class="pa-t">${titles[coll]}</div><div class="pa-n">${it.num}</div><div class="pa-d">del ${fdate(it.data)}</div></div>
    </div>
    <div class="pa-party"><div class="pa-pl">${partyLabel}</div><div class="pa-pn">${p.nome}</div><div class="pa-pa">${pAddr}</div><div class="pa-pm">${pMeta}</div></div>
    ${shipBlock}
    ${ddtBlock}
    <table class="pa-lines"><thead><tr><th>Codice</th><th>Descrizione</th>${hasLot?'<th>Lotto</th><th class="r">Scadenza</th>':''}<th class="r">Q.tà</th><th class="r">Prezzo</th><th class="r">Imponibile</th>${hasSc?'<th class="r">Sconto</th>':''}<th class="r">IVA</th><th class="r">Totale</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="pa-tot"><table>
      <tr><td>Imponibile</td><td class="r">${eur(imp(it.righe))}</td></tr>
      <tr><td>IVA</td><td class="r">${eur(ivaT(it.righe))}</td></tr>
      <tr class="g"><td>Totale documento</td><td class="r">${eur(tot(it.righe))}</td></tr>
    </table></div>
    ${note}
    <div class="pa-footer">${az.iso?az.iso+' · ':''}Documento generato con Ipsofarma Gestionale</div>
  </div>`;
}

function buildStandalonePrintDoc(coll,it){
  // window.print() all'apertura: l'agente Windows apre questa pagina con Edge in modalità
  // --kiosk-printing, che sopprime la finestra di dialogo ma non stampa da sola — serve
  // che la pagina stessa richieda la stampa. onafterprint chiude la scheda per pulizia.
  return `<!doctype html><html><head><meta charset="utf-8"><title>${aiEsc(it.num)}</title><style>${PA_PRINT_CSS}</style></head><body onload="window.print()" onafterprint="window.close()">${buildPrintHTML(coll,it)}</body></html>`;
}
async function printRemote(coll,id){
  const it=DB[coll].find(x=>x.id===id);if(!it)return;
  if(!ghToken()){toast('Configura prima il token GitHub nelle Impostazioni (serve anche per questo)');return;}
  const doc=buildStandalonePrintDoc(coll,it);
  try{
    const res=await ghContentsGet(PRINT_QUEUE_FILE);
    const data=(res&&res.data)||{items:[]};
    data.items=data.items||[];
    data.items.push({id:uid('pq'),addedAt:new Date().toISOString(),title:it.num,html:doc});
    if(data.items.length>50)data.items=data.items.slice(-50);
    const ok=await ghContentsPut(PRINT_QUEUE_FILE,data,res&&res.sha);
    toast(ok?'🖨️ Inviato alla stampante d\'ufficio: '+it.num:'Errore nell\'invio alla stampante');
  }catch(e){toast('Errore nell\'invio alla stampante');}
}

function aiLoadPdfJs(){return new Promise((res,rej)=>{
  if(window.pdfjsLib){res(window.pdfjsLib);return;}
  const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload=()=>{try{window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';res(window.pdfjsLib);}catch(e){rej(e);}};
  s.onerror=()=>rej(new Error('Impossibile caricare il lettore PDF (serve connessione internet)'));
  document.head.appendChild(s);
});}
async function aiPdfToImages(file,maxPages){
  const lib=await aiLoadPdfJs();const buf=await file.arrayBuffer();
  const pdf=await lib.getDocument({data:buf}).promise;const n=Math.min(pdf.numPages,maxPages||4);const imgs=[];
  for(let i=1;i<=n;i++){const page=await pdf.getPage(i);const vp=page.getViewport({scale:1.6});
    const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    imgs.push(canvas.toDataURL('image/png'));}
  return imgs;
}

function aiSystemPrompt(ctx){
  return `Sei l'assistente operativo di un gestionale per distribuzione di dispositivi medici. Oggi è ${ctx.today}.
Converti l'istruzione dell'utente in un piano di azioni in JSON. Rispondi SOLO con JSON valido, senza testo prima o dopo e senza backtick.
Schema: {"explanation":"breve frase in italiano","answer":"<risposta in italiano se è una domanda, altrimenti vuota>","actions":[...]}
Tipi di azione:
- {"type":"mark_paid","target":"fattureFornitore"|"fattureCliente","party":<nome o null>,"period":<"AAAA-MM" | {"from":"AAAA-MM-GG","to":"AAAA-MM-GG"} | null>}
- {"type":"mark_unpaid", ...stessi campi}
- {"type":"generate_ddt","order":"<numero ordine cliente>"}
- {"type":"generate_invoice","order":"<numero ordine cliente>"}
- {"type":"generate_supplier_order","order":"<numero ordine cliente>"}
- {"type":"create_quote","client":"<nome cliente>","lines":[{"product":"<codice o descrizione prodotto>","qty":<numero>,"price":<prezzo opzionale>,"sconto":<sconto opzionale>}],"note":"<nota opzionale>"}
- {"type":"create_order","client":"<nome cliente>","lines":[{"product":"<codice o descrizione prodotto>","qty":<numero>,"price":<prezzo unitario opzionale>,"sconto":<"50" o "50+15" opzionale>}]}
- {"type":"create_supplier_invoice","supplier":"<ragione sociale fornitore>","number":"<numero fattura>","date":"<AAAA-MM-GG>","order_ref":"<numero ordine cliente da 'Vs.ord.' se presente>","lines":[{"code":"<codice articolo>","descr":"<descrizione>","qty":<numero>,"price":<prezzo unitario PIENO, prima di sconti>,"sconto":"<es. \"50+15\" se ci sono più sconti a cascata, altrimenti \"0\">","iva":<aliquota es. 22>,"lotto":"<numero di lotto/partita se presente, altrimenti stringa vuota>","scad":"<data di scadenza del lotto in AAAA-MM-GG se presente, altrimenti stringa vuota>"}]}
- {"type":"query","metric":"sum_total"|"sum_imponibile"|"count","target":"fattureFornitore"|"fattureCliente"|"ordiniCliente"|"ddt"|"ordiniFornitore","party":<nome o null>,"period":<"AAAA-MM" o {"from","to"} o null>,"paid":<true|false|null>}
Regole:
- Per DOMANDE e riepiloghi usa "query" (sola lettura). Es. "quanto devo a B.Braun?" => query sum_total su fattureFornitore, party B.Braun, paid:false. "quanto ho fatturato a marzo?" => sum_total su fattureCliente, period "2026-03".
- "paid":false = da pagare, true = pagate, null = tutte.
- Se la richiesta è solo una domanda generica non calcolabile, metti "actions":[] e scrivi la risposta nel campo "answer".
- target esattamente "fattureFornitore" (acquisti/passive: es. B.Braun) o "fattureCliente" (vendite/attive).
- party deve corrispondere a un nome negli elenchi sotto (anche parziale); se non indicato usa null.
- period: un mese e' "AAAA-MM" (aprile 2026 = "2026-04"); se assente usa null.
- order: riporta il numero come indicato dall'utente (es. "1", "OC/2026/0003").
- "DDT e fattura dell'ordine X" => due azioni: prima generate_ddt poi generate_invoice.
- Per "crea/inserisci un preventivo per <cliente> con <prodotti>" usa create_quote: stessa struttura di create_order ma genera un preventivo (che poi puoi trasformare in ordine con un clic). Aggiungi una nota se l'utente la specifica.
- Per "crea/inserisci un ordine per <cliente> con <prodotti>" usa create_order: client = un nome dell'elenco clienti; per ogni prodotto metti in "product" il codice o la descrizione così come la dice l'utente, e la quantità. Prezzo e sconto solo se l'utente li specifica. Se stai leggendo un documento allegato e il cliente non è in elenco, usa la ragione sociale presente nel documento.
- Per una FATTURA DI UN FORNITORE (documento con "Fattura", un numero, e righe articolo/descrizione/quantità/prezzo/importo/IVA, es. da B.Braun) usa create_supplier_invoice: supplier = ragione sociale del fornitore; number = numero della fattura; date in formato AAAA-MM-GG. Per ogni riga: code = il CODICE ARTICOLO alfanumerico del prodotto (es. "B0068598"), NON il numero di posizione a 4 cifre che lo precede (es. "0010","0020") e NON eventuali suffissi/aghi nella descrizione (es. "HR37S") né i dati di lotto ("Partita","Scadenza","Pacco") — quei dati di lotto vanno invece nei campi lotto/scad qui sotto. Nei documenti B.Braun la riga è nell'ordine: <posizione 4 cifre> <codice articolo> <descrizione>; prendi il secondo campo come code. descr = descrizione; qty = la QUANTITÀ fatturata (colonna "quantità", es. 10, non la "u.m."); price = il PREZZO UNITARIO PIENO, PRIMA di eventuali sconti (la prima riga di prezzo subito sotto la descrizione articolo, es. "1.634,27000"), NON il prezzo netto già scontato. Se sotto il prezzo pieno ci sono righe "Sconto" o "Sc" con percentuali (es. "Sconto50% cliente/GT", "Sc 15% da netto posiz."), estrai TUTTE le percentuali in ordine e mettile nel campo sconto come stringa concatenata con "+" (es. due sconti 50% e 15% in cascata → sconto:"50+15"). Se non ci sono sconti, sconto:"0". La riga "Netto posizione" è il risultato finale con sconti già applicati — NON usarla come price, serve solo a verificare il calcolo (price × qty × fattori sconto deve corrispondere a "Netto posizione" = imponibile). iva = aliquota (es. 22, presa dalla colonna finale della riga "Netto posizione"). lotto = il numero di lotto/partita indicato come "Partita", "Lotto" o simile vicino alla riga articolo (es. "L123456"); se assente lascia stringa vuota. scad = la data di scadenza del lotto indicata come "Scadenza" vicino alla riga articolo, convertita in formato AAAA-MM-GG; se assente lascia stringa vuota. order_ref = il numero d'ordine del CLIENTE indicato come "Rif.cliente Vs.ord. NNN" (NON il "Numero d'ordine" del fornitore); serve per collegare e scalare l'ordine fornitore corrispondente. Usa i valori esatti del documento.
- Non inventare azioni. Se non eseguibile, restituisci "actions":[] e spiega in explanation.
Fornitori: ${ctx.fornitori.join(', ')}
Clienti: ${ctx.clienti.join(', ')}
Ordini cliente: ${ctx.ordiniCliente.map(o=>o.num+' ('+o.cliente+')').join('; ')||'nessuno'}`;
}
async function aiCallOnce(sys,userText,file){
  const az=DB.azienda||{};const prov=az.aiProvider||'claude';
  let txt='',maxTok=file?8000:1000;
  let b64=null,mt=null;
  if(file){b64=await aiFileB64(file);mt=file.type||(/\.pdf$/i.test(file.name)?'application/pdf':'image/jpeg');}
  if(prov==='openai'){
    const base=(az.aiBase||'').trim().replace(/\/+$/,'');
    if(!base)throw new Error('Imposta l\'indirizzo (Base URL) nelle Impostazioni AI');
    const model=(az.aiModel||'').trim()||'llama3.1';
    const headers={"Content-Type":"application/json"};if(az.aiOkey)headers["Authorization"]="Bearer "+az.aiOkey;
    let content=userText;
    if(file){
      if(mt==='application/pdf'){
        const imgs=await aiPdfToImages(file,12);
        if(!imgs.length)throw new Error('PDF vuoto o non leggibile');
        content=[{type:"text",text:userText}].concat(imgs.map(u=>({type:"image_url",image_url:{url:u}})));
      }else{
        content=[{type:"text",text:userText},{type:"image_url",image_url:{url:"data:"+mt+";base64,"+b64}}];
      }
    }
    const res=await fetch(base+"/chat/completions",{method:"POST",headers,body:JSON.stringify({model,temperature:0,max_tokens:maxTok,messages:[{role:"system",content:sys},{role:"user",content}]})});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();txt=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'';
  }else{
    const headers={"Content-Type":"application/json"};
    const key=prov==='claudekey'?(az.aiKey||'').trim():'';
    if(key){headers["x-api-key"]=key;headers["anthropic-version"]="2023-06-01";headers["anthropic-dangerous-direct-browser-access"]="true";}
    let content;
    if(file){const blk=mt==='application/pdf'?{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}:{type:"image",source:{type:"base64",media_type:mt,data:b64}};content=[blk,{type:"text",text:userText}];}
    else content=userText;
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers,body:JSON.stringify({model:"claude-sonnet-4-5-20250929",max_tokens:maxTok,system:sys,messages:[{role:"user",content}]})});
    const data=await res.json();
    if(!res.ok)throw new Error((data&&data.error&&data.error.message)||('HTTP '+res.status));
    txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  }
  txt=String(txt).replace(/```json|```/g,'').trim();
  let plan;try{plan=JSON.parse(txt);}catch(_){let src=txt;const m=txt.match(/[\[\{][\s\S]*[\]\}]/);if(m)src=m[0];try{plan=JSON.parse(src);}catch(_2){src=src.replace(/,\s*([\]\}])/g,'$1');try{plan=JSON.parse(src);}catch(_3){plan=null;}}}
  if(!plan)throw new Error('risposta non interpretabile'+(txt?' — ricevuto: '+txt.slice(0,300):' (risposta vuota, controlla chiave/modello nelle Impostazioni AI)'));
  return plan;
}
async function aiRun(){
  if(AIBUSY)return;
  const q=(document.getElementById('ai-q').value||'').trim();if(!q&&!AIFILES.length)return;
  AIBUSY=true;const out=document.getElementById('ai-out'),btn=document.getElementById('ai-go');
  btn.disabled=true;btn.textContent='…';
  try{
    const ctx=aiContext();const sys=aiSystemPrompt(ctx);
    const fileInstr="Nel documento allegato c'è un documento commerciale. Analizza il tipo:\n- Se è un PREVENTIVO o OFFERTA (contiene prezzi proposti a un cliente), restituisci create_quote con: client = ragione sociale cliente, lines = righe prodotto (product=codice o descrizione, qty, price=prezzo unitario, sconto se indicato), note = eventuale nota.\n- Se è un ORDINE inviato da un cliente, restituisci create_order con client e righe.\n- Se è una FATTURA DI UN FORNITORE (contiene 'Fattura', un numero, righe articolo/quantità/prezzo/IVA — es. B.Braun), restituisci create_supplier_invoice con supplier, number, date, order_ref (numero 'Vs.ord.' se presente) e lines (code=codice articolo alfanumerico come 'B0068598', NON posizione a 4 cifre '0010'; qty=quantità fatturata; price=PREZZO UNITARIO PIENO prima di sconti, es. '1.634,27000', NON il netto scontato; sconto=stringa con le percentuali di sconto a cascata unite da '+', es. '50+15' se ci sono più righe 'Sconto'/'Sc' con percentuali, altrimenti '0'; iva=aliquota; lotto=numero di lotto/partita se indicato vicino alla riga articolo, altrimenti stringa vuota; scad=data di scadenza del lotto in formato AAAA-MM-GG se indicata, altrimenti stringa vuota).\nUsa i dati esatti del documento. Restituisci SOLO il JSON dell'azione, senza testo aggiuntivo.";
    if(!AIFILES.length){
      out.innerHTML='<div class="ai-msg">Sto interpretando la richiesta…</div>';
      const plan=await aiCallOnce(sys,q,null);
      aiShowPlan(plan);
    }else if(AIFILES.length===1){
      out.innerHTML='<div class="ai-msg">Sto leggendo il documento…</div>';
      const userText=fileInstr+(q?(' Indicazioni aggiuntive: '+q):'');
      const plan=await aiCallOnce(sys,userText,AIFILES[0]);
      aiShowPlan(plan);
    }else{
      // Più file: elabora uno alla volta e unisci tutte le azioni in un unico piano da confermare insieme
      const userText=fileInstr+(q?(' Indicazioni aggiuntive: '+q):'');
      const allActions=[];const errors=[];
      for(let i=0;i<AIFILES.length;i++){
        const f=AIFILES[i];
        out.innerHTML='<div class="ai-msg">Sto leggendo '+aiEsc(f.name)+' ('+(i+1)+'/'+AIFILES.length+')…</div>';
        try{
          const plan=await aiCallOnce(sys,userText,f);
          const acts=(plan&&plan.actions)||[];
          if(acts.length)allActions.push(...acts);
          else errors.push(f.name+': nessuna azione riconosciuta');
        }catch(e){errors.push(f.name+': '+(e.message||e));}
      }
      const plan={explanation:'Lette '+AIFILES.length+' file · '+allActions.length+' documento/i riconosciuto/i'+(errors.length?' · '+errors.length+' con errori':''),actions:allActions};
      aiShowPlan(plan);
      if(errors.length){
        const out2=document.getElementById('ai-out');
        out2.innerHTML+='<div class="ai-card" style="margin-top:10px"><div class="ai-expl">File non riconosciuti:</div><ul class="ai-list">'+errors.map(e=>`<li class="ai-x">${aiEsc(e)}</li>`).join('')+'</ul></div>';
      }
    }
  }catch(e){
    out.innerHTML='<div class="ai-err">Non sono riuscito a completare la richiesta.<br>Verifica il motore nelle Impostazioni AI. Per leggere i PDF con Gemini serve un modello "vision" (es. gemini-2.5-flash) e connessione a internet; in alternativa usa il motore Claude.<br><span class="ai-x">'+aiEsc(e.message||e)+'</span></div>';
  }finally{AIBUSY=false;btn.disabled=false;btn.textContent='Invia';}
}
function aiNorm(s){return (s||'').toLowerCase();}
function aiInPeriod(d,p){if(!p)return true;d=d||'';if(typeof p==='string')return d.startsWith(p);if(p.month&&p.year)return d.startsWith(p.year+'-'+String(p.month).padStart(2,'0'));if(p.from&&d<p.from)return false;if(p.to&&d>p.to)return false;return true;}
function aiPeriodLabel(p){if(!p)return '';if(typeof p==='string'){const x=p.split('-');const nm=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];return x[1]?(nm[parseInt(x[1])-1]||'')+' '+x[0]:x[0];}return (p.from||'')+'–'+(p.to||'');}

/* ===== Dimensione finestre modali (ridimensionabile e persistente) ===== */
let MODALSIZE=null;try{MODALSIZE=JSON.parse(localStorage.getItem('modalSize')||'null');}catch(e){}
let MODALRO=null;
function applyModalSize(){
  const m=document.getElementById('modal');if(!m)return;
  // La dimensione ridimensionata a mano viene ricordata per tutte le finestre, ma solo se non
  // è più piccola della misura di base: altrimenti una finestra rimpicciolita per errore (es. un
  // semplice conferma) resterebbe minuscola anche per moduli più ricchi come "Nuovo ordine cliente".
  if(MODALSIZE&&MODALSIZE.w>=640&&MODALSIZE.h>=420){m.style.width=MODALSIZE.w+'px';m.style.height=MODALSIZE.h+'px';}
  else{m.style.width='';m.style.height='';}
  if(MODALRO)MODALRO.disconnect();
  if(window.ResizeObserver){
    MODALRO=new ResizeObserver(entries=>{
      const e=entries[0];if(!e)return;
      const w=Math.round(e.contentRect.width),h=Math.round(e.contentRect.height);
      if(w<100||h<100)return;
      MODALSIZE={w,h};
      clearTimeout(applyModalSize._t);
      applyModalSize._t=setTimeout(()=>{try{localStorage.setItem('modalSize',JSON.stringify(MODALSIZE));}catch(err){}},250);
    });
    MODALRO.observe(m);
  }
}
/* ===== Posizione finestre modali (spostabile trascinando l'intestazione) ===== */
let MODALPOS=null;try{MODALPOS=JSON.parse(localStorage.getItem('modalPos')||'null');}catch(e){}
function applyModalPos(){
  const m=document.getElementById('modal');if(!m)return;
  if(MODALPOS&&typeof MODALPOS.x==='number'&&typeof MODALPOS.y==='number'){
    m.style.position='fixed';m.style.margin='0';m.style.left=MODALPOS.x+'px';m.style.top=MODALPOS.y+'px';
  }
}
function setupModalDrag(){
  const m=document.getElementById('modal');if(!m||m._dragBound)return;m._dragBound=true;
  let dragging=false,sx=0,sy=0,ox=0,oy=0;
  m.addEventListener('mousedown',e=>{
    const head=e.target.closest('.modal-head');
    if(!head||e.target.closest('.x'))return;
    const r=m.getBoundingClientRect();
    m.style.position='fixed';m.style.margin='0';m.style.left=r.left+'px';m.style.top=r.top+'px';
    dragging=true;sx=e.clientX;sy=e.clientY;ox=r.left;oy=r.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const maxX=window.innerWidth-70,maxY=window.innerHeight-40;
    const nx=Math.max(-(m.offsetWidth-70),Math.min(ox+(e.clientX-sx),maxX));
    const ny=Math.max(0,Math.min(oy+(e.clientY-sy),maxY));
    m.style.left=nx+'px';m.style.top=ny+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;dragging=false;
    MODALPOS={x:parseInt(m.style.left)||0,y:parseInt(m.style.top)||0};
    try{localStorage.setItem('modalPos',JSON.stringify(MODALPOS));}catch(err){}
  });
}
(function(){
  const ov=document.getElementById('overlay');
  if(ov)new MutationObserver(muts=>{
    if(muts.some(mu=>mu.attributeName==='class')&&ov.classList.contains('show')){applyModalSize();applyModalPos();setupModalDrag();}
  }).observe(ov,{attributes:true});
})();

    o.righe.forEach(function(r){
      var res=Math.max(0,(r.qty||0)-(r.qtyEv!=null?r.qtyEv:0));
      if(res<=0)return;
      rows.push({ocNum:o.num,ocId:o.id,data:o.data,clienteId:o.clienteId,
        cliente:(cl[o.clienteId]||{}).nome||'?',

  rows.forEach(function(r){
    if(!byClient[r.clienteId])byClient[r.clienteId]={nome:r.cliente,rows:[],tot:0};

let GS_IDX=0;
function gsSearch(q){
  q=(q||'').trim();const res=document.getElementById('gsRes');
  if(!res)return;
  if(q.length<2||!DB){gsHide();return;}
  const hits=[];const ql=q.toLowerCase();
  const add=(tag,main,sub,fn,accent)=>{hits.push({tag,main,sub,fn,accent});};
  try{
    // Clienti
    const cliMatch=DB.clienti.filter(c=>(c.nome||'').toLowerCase().includes(ql)||(c.piva||'').includes(ql)||(c.cf||'').includes(ql));
    cliMatch.slice(0,3).forEach(c=>{
      const id=c.id;
      add('Cliente',c.nome,c.citta||'',()=>{nav('clienti');setTimeout(()=>openClienteForm(id),80);});
      // Documenti del cliente
      const nFT=DB.fattureCliente.filter(f=>f.clienteId===id).length;
      const nOC=DB.ordiniCliente.filter(o=>o.clienteId===id).length;
      const nDDT=DB.ddt.filter(d=>d.clienteId===id).length;
      if(nFT)add('→ Fatture',`${nFT} fatture di ${c.nome}`,'',()=>{nav('ft');FFILT.forn=id;renderTop();renderContent();},'accent');
      if(nOC)add('→ Ordini',`${nOC} ordini di ${c.nome}`,'',()=>{nav('oc');FFILT.forn=id;renderTop();renderContent();},'accent');
      if(nDDT)add('→ DDT',`${nDDT} DDT di ${c.nome}`,'',()=>{nav('ddt');FFILT.forn=id;renderTop();renderContent();},'accent');
    });
    // Fornitori
    const fornMatch=DB.fornitori.filter(f=>(f.nome||'').toLowerCase().includes(ql)||(f.piva||'').includes(ql));
    fornMatch.slice(0,2).forEach(f=>{
      const id=f.id;
      add('Fornitore',f.nome,f.citta||'',()=>{nav('fornitori');setTimeout(()=>openFornitoreForm(id),80);});
      const nFTF=DB.fattureFornitore.filter(x=>x.fornitoreId===id).length;
      const nOF=DB.ordiniFornitore.filter(o=>o.fornitoreId===id).length;
      if(nFTF)add('→ Fatt.For.',`${nFTF} fatture di ${f.nome}`,'',()=>{nav('ftf');FFILT.forn=id;renderTop();renderContent();},'accent');
      if(nOF)add('→ Ordini',`${nOF} ordini a ${f.nome}`,'',()=>{nav('of');FFILT.forn=id;renderTop();renderContent();},'accent');
    });
    // Documenti per numero
    if(cliMatch.length===0&&fornMatch.length===0){
      DB.fattureCliente.filter(f=>f.num.toLowerCase().includes(ql)).slice(0,5).forEach(f=>{
        const id=f.id;add('Fattura',f.num,cliente(f.clienteId).nome+' · '+fdate(f.data),()=>{nav('ft');setTimeout(()=>{SEL=id;renderContent();},80);});});
      DB.fattureFornitore.filter(f=>f.num.toLowerCase().includes(ql)).slice(0,3).forEach(f=>{
        const id=f.id;add('Fatt.For.',f.num,fornitore(f.fornitoreId).nome,()=>{nav('ftf');setTimeout(()=>{SEL=id;renderContent();},80);});});
      DB.ordiniCliente.filter(o=>o.num.toLowerCase().includes(ql)).slice(0,4).forEach(o=>{
        const id=o.id;add('Ordine',o.num,cliente(o.clienteId).nome,()=>{nav('oc');setTimeout(()=>{SEL=id;renderContent();},80);});});
      DB.ordiniFornitore.filter(o=>o.num.toLowerCase().includes(ql)).slice(0,3).forEach(o=>{
        const id=o.id;add('Ord.For.',o.num,fornitore(o.fornitoreId).nome,()=>{nav('of');setTimeout(()=>{SEL=id;renderContent();},80);});});
      try{allProdotti().filter(p=>(p.codice||'').toLowerCase().includes(ql)||(p.descrizione||'').toLowerCase().includes(ql)).slice(0,4).forEach(p=>{
        const cod=p.codice;add('Prodotto',p.codice,p.descrizione,()=>{nav('prodotti');setTimeout(()=>openProdottoForm(cod),80);});});}catch(e){}
    }
  }catch(e){console.warn('gsSearch:',e);}
  if(!hits.length){
    res.innerHTML='<div style="padding:11px 16px;color:var(--muted);font-size:13px">Nessun risultato per "'+aiEsc(q)+'"</div>';
    res._hits=[];res.style.display='block';return;
  }
  GS_IDX=0;
  res.innerHTML=hits.map((h,i)=>`<div class="g-res-item${h.accent?' g-res-accent':''}" data-i="${i}" onmousedown="event.preventDefault();gsPick(${i})">
    <span class="g-res-tag" style="${h.accent?'color:var(--accent-d)':''}">${h.tag}</span>
    <span class="g-res-main" style="${h.accent?'color:var(--accent-d);font-weight:500':''}">${aiEsc(h.main)}</span>
    ${h.sub?`<span class="g-res-sub">${aiEsc(h.sub)}</span>`:''}
  </div>`).join('');
  res._hits=hits;res.style.display='block';
}
function gsPick(i){const res=document.getElementById('gsRes');const h=res._hits&&res._hits[i];if(h){gsHide();document.getElementById('gsInput').value='';h.fn();}}
function gsHide(){const res=document.getElementById('gsRes');if(res)res.style.display='none';}
function gsKey(e){const res=document.getElementById('gsRes');if(!res._hits)return;if(e.key==='ArrowDown'){GS_IDX=Math.min(GS_IDX+1,res._hits.length-1);[...res.querySelectorAll('.g-res-item')].forEach((el,i)=>el.style.background=i===GS_IDX?'var(--surface2)':'');}else if(e.key==='ArrowUp'){GS_IDX=Math.max(GS_IDX-1,0);[...res.querySelectorAll('.g-res-item')].forEach((el,i)=>el.style.background=i===GS_IDX?'var(--surface2)':'');}else if(e.key==='Enter'){gsPick(GS_IDX);}else if(e.key==='Escape'){gsHide();document.getElementById('gsInput').value='';}}

let SCAD_SORT_DET={key:'scadenza',dir:'asc'};
function setScadSort(key){if(SCAD_SORT.key===key)SCAD_SORT.dir=SCAD_SORT.dir==='asc'?'desc':'asc';else{SCAD_SORT.key=key;SCAD_SORT.dir=key==='nome'?'asc':'desc';}renderContent();}
function setScadSortDet(key){if(SCAD_SORT_DET.key===key)SCAD_SORT_DET.dir=SCAD_SORT_DET.dir==='asc'?'desc':'asc';else{SCAD_SORT_DET.key=key;SCAD_SORT_DET.dir='asc';}renderContent();}
function scadenziarioView(){
  if(!DB||!DB.fattureCliente)return '<div class="t-mut" style="padding:32px">Caricamento…</div>';
  const cl=Object.fromEntries(DB.clienti.map(c=>[c.id,c]));
  const rows=DB.fattureCliente.filter(f=>payState(f).state!=='completo'&&payState(f).residuo>0).map(f=>{const c=cl[f.clienteId]||{nome:'?',term:'60'};const dd=dueDate(c,f);const over=isOverdue(c,f);const days=Math.round((new Date(dd)-new Date(today()))/(864e5));return{f,c,dd,over,days,totale:payState(f).residuo};});
  const totOverdue=rows.filter(r=>r.over).reduce((s,r)=>s+r.totale,0);
  const totInScad=rows.filter(r=>!r.over&&r.days<=30).reduce((s,r)=>s+r.totale,0);
  const week=rows.filter(r=>!r.over&&r.days<=7).reduce((s,r)=>s+r.totale,0);
  const statsHtml=`<div class="stats" style="margin-bottom:16px">
      ${stat('Scadute',eur0(totOverdue),rows.filter(r=>r.over).length+' fatture','var(--red)','')}
      ${stat('Scadono in 7 gg',eur0(week),rows.filter(r=>!r.over&&r.days<=7).length+' fatture','var(--amber)','')}
      ${stat('Scadono in 30 gg',eur0(totInScad),rows.filter(r=>!r.over&&r.days<=30).length+' fatture','var(--blue)','')}
    </div>`;

  if(SCAD_CLI){
    // Vista dettaglio: fatture scadute del cliente selezionato
    const c=cl[SCAD_CLI]||{nome:'?'};
    const sd=SCAD_SORT_DET,dird=sd.dir==='asc'?1:-1;
    const detValD=(r,key)=>{switch(key){case 'num':return r.f.num;case 'data':return r.f.data;case 'scadenza':return r.dd;case 'totale':return r.totale;case 'stato':return Math.abs(r.days);}return '';};
    const detRows=rows.filter(r=>r.f.clienteId===SCAD_CLI&&r.over).sort((a,b)=>{const va=detValD(a,sd.key),vb=detValD(b,sd.key);if(typeof va==='number'&&typeof vb==='number')return (va-vb)*dird;return String(va).localeCompare(String(vb),'it',{numeric:true})*dird;});
    const totC=detRows.reduce((s,r)=>s+r.totale,0);
    const thd=(key,label)=>{const on=sd.key===key,ar=on?(sd.dir==='asc'?' ↑':' ↓'):'';return `<th class="thsort ${on?'on':''}" onclick="setScadSortDet('${key}')">${label}${ar}</th>`;};
    const trs=detRows.map(r=>`<tr>
        <td class="code" onclick="SEL='${r.f.id}';MOD='ft';renderContent();" style="cursor:pointer;color:var(--blue)">${r.f.num}</td>
        <td>${fdate(r.f.data)}</td>
        <td>${fdate(r.dd)}</td>
        <td style="text-align:right"><b>${eur(r.totale)}</b></td>
        <td><span class="pill p-red">Scaduta da ${Math.abs(r.days)} gg</span></td>
      </tr>`).join('');
    return `<div class="page-head"><div class="page-title">Scadenziario</div>
      <button class="btn" onclick="exportScadenziarioXLS()">⬇ Excel</button>
      ${detRows.length?`<button class="btn primary" onclick="openSollecito('${SCAD_CLI}')">✉ Invia sollecito</button>`:''}</div>
      ${statsHtml}
      <button class="btn" style="margin-bottom:14px" onclick="SCAD_CLI='';document.getElementById('content').innerHTML=scadenziarioView()">← Tutti i clienti</button>
      <div class="page-title" style="font-size:16px;margin-bottom:2px">${aiEsc(c.nome||'?')}</div>
      <p class="t-mut" style="margin:0 0 14px">${detRows.length} fattur${detRows.length===1?'a scaduta':'e scadute'} · Totale ${eur(totC)}</p>
      <div class="tbl-scroll-hint">⇆ scorri per vedere tutte le colonne</div><div class="tablecard"><table class="tbl"><thead><tr>${thd('num','Fattura')}${thd('data','Emessa')}${thd('scadenza','Scadenza')}${thd('totale','Totale')}${thd('stato','Stato')}</tr></thead><tbody>${trs||'<tr><td colspan="5" class="t-mut" style="text-align:center;padding:24px">Nessuna fattura scaduta per questo cliente</td></tr>'}</tbody></table></div>`;
  }

  // Vista principale: un rigo per cliente, con il totale scaduto
  const byClient={};
  rows.filter(r=>r.over).forEach(r=>{
    const id=r.f.clienteId;
    if(!byClient[id])byClient[id]={c:r.c,tot:0,n:0,maxDays:0};
    byClient[id].tot+=r.totale;byClient[id].n++;byClient[id].maxDays=Math.max(byClient[id].maxDays,Math.abs(r.days));
  });
  const ss=SCAD_SORT,dirs=ss.dir==='asc'?1:-1;
  const clientValS=([,g],key)=>{switch(key){case 'nome':return (g.c.nome||'').toLowerCase();case 'n':return g.n;case 'maxDays':return g.maxDays;case 'tot':return g.tot;}return '';};
  const clientRows=Object.entries(byClient).sort((a,b)=>{const va=clientValS(a,ss.key),vb=clientValS(b,ss.key);if(typeof va==='number'&&typeof vb==='number')return (va-vb)*dirs;return String(va).localeCompare(String(vb),'it',{numeric:true})*dirs;});
  const ths=(key,label)=>{const on=ss.key===key,ar=on?(ss.dir==='asc'?' ↑':' ↓'):'';return `<th class="thsort ${on?'on':''}" onclick="setScadSort('${key}')">${label}${ar}</th>`;};
  const trs2=clientRows.map(([id,g])=>`<tr onclick="SCAD_CLI='${id}';document.getElementById('content').innerHTML=scadenziarioView()" style="cursor:pointer">
      <td><b>${aiEsc(g.c.nome||'?')}</b></td>
      <td style="text-align:right"><b>${eur(g.tot)}</b></td>
      <td>${g.n}</td>
      <td>fino a ${g.maxDays} gg</td>
      <td><button class="btn sm" onclick="event.stopPropagation();openSollecito('${id}')">✉</button></td>
    </tr>`).join('');
  return `<div class="page-head"><div class="page-title">Scadenziario</div>
    <button class="btn" onclick="exportScadenziarioXLS()">⬇ Excel</button></div>
    ${statsHtml}
    <div class="tbl-scroll-hint">⇆ scorri per vedere tutte le colonne</div><div class="tablecard"><table class="tbl"><thead><tr>${ths('nome','Cliente')}${ths('tot','Totale scaduto')}${ths('n','Fatture scadute')}${ths('maxDays','Scaduto da')}<th></th></tr></thead><tbody>${trs2||'<tr><td colspan="5" class="t-mut" style="text-align:center;padding:24px">Nessuna fattura scaduta 🎉</td></tr>'}</tbody></table></div>`;
}
function exportScadenziarioXLS(){
  const cl=Object.fromEntries(DB.clienti.map(c=>[c.id,c]));
  let fatture=DB.fattureCliente.filter(f=>payState(f).state!=='completo'&&payState(f).residuo>0);
  if(SCAD_CLI)fatture=fatture.filter(f=>f.clienteId===SCAD_CLI);
  const rows=fatture.map(f=>{
    const c=cl[f.clienteId]||{};const dd=dueDate(c,f);const days=Math.round((new Date(dd)-new Date(today()))/(864e5));
    return{Fattura:f.num,Cliente:c.nome||'',Emessa:fdate(f.data),Scadenza:fdate(dd),'Totale €':parseFloat(payState(f).residuo.toFixed(2)),Stato:days<0?'Scaduta da '+Math.abs(days)+' gg':days===0?'Scade oggi':days+' gg'};
  });
  const suffix=SCAD_CLI?'_'+(cl[SCAD_CLI]?.nome||'cliente').replace(/[^a-z0-9]/gi,'_'):'';
  xlsDownload(rows,'Scadenziario'+suffix+'_'+today()+'.xlsx','Scadenziario');
}

        <div style="overflow-x:auto"><table class="tbl" style="margin:0;min-width:300px">

          <tbody>${prodRows||'<tr><td colspan="3" class="t-mut" style="padding:16px">Nessun dato</td></tr>'}</tbody>

      <div class="panel"><div class="panel-h">Fatturato per cliente

function exportListXLS(){
  const m=META[MOD];if(!m||!m.coll)return;
  const rows=filteredDocRows();if(!rows.length){toast('Nessun dato da esportare');return;}
  const cl=Object.fromEntries(DB.clienti.map(c=>[c.id,c]));
  const fo=Object.fromEntries(DB.fornitori.map(f=>[f.id,f.nome]));
  const isForn=MOD==='ftf'||MOD==='of';
  const data=rows.map(r=>{
    const it=r.it;
    const partyObj=isForn?null:cl[it.clienteId];
    const party=isForn?fo[it.fornitoreId]||'':(partyObj?partyObj.nome:'');
    const destObj=(!isForn&&it.destId&&partyObj&&partyObj.dest)?partyObj.dest.find(d=>d.id===it.destId):null;
    const row={Numero:it.num,Data:it.data,Controparte:party};
    if(!isForn)row.Sede=destObj?(destObj.nome||destObj.citta||'Sede'):'Sede legale';
    row['Totale €']=parseFloat(tot(it.righe||[]).toFixed(2));
    row.Stato=it.paid?'Pagata':'Aperta';
    return row;
  });
  const cl2=Object.fromEntries(DB.clienti.map(c=>[c.id,c.nome]));
  const partyName=FFILT.forn?(isForn?fo[FFILT.forn]:cl2[FFILT.forn]):'';
  let suffix=partyName?'_'+partyName.replace(/[^a-z0-9]/gi,'_'):'';
  if(FFILT.dest){const selCli=cl[FFILT.forn];const dn=FFILT.dest==='__sede__'?'SedeLegale':(selCli&&selCli.dest?(selCli.dest.find(d=>d.id===FFILT.dest)||{}).nome||'Sede':'Sede');suffix+='_'+String(dn).replace(/[^a-z0-9]/gi,'_');}
  xlsDownload(data,(m.title||MOD)+suffix+'_'+today()+'.xlsx',m.title||MOD);
}
async function xlsDownload(rows,filename,sheetName){
  if(!rows||!rows.length){toast('Nessun dato da esportare');return;}
  try{
    if(!window.XLSX){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const XLSX=window.XLSX;
    const ws=XLSX.utils.json_to_sheet(rows);
    const cols=Object.keys(rows[0]||{});
    ws['!cols']=cols.map(k=>({wch:Math.max(k.length+2,Math.max(...rows.map(r=>String(r[k]||'').length))+2)}));
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,sheetName||'Dati');
    XLSX.writeFile(wb,filename);
    toast('✅ Excel scaricato: '+filename);
  }catch(e){toast('Errore export: '+(e.message||e));console.error(e);}
}

/* ===== OVERDUE BADGE in dashboard nav ===== */
function dueDate(cliente,inv){const days=cliente&&cliente.term!=null&&cliente.term!==''?parseInt(cliente.term):30;const d=new Date((inv.data||today())+'T00:00:00');d.setDate(d.getDate()+(isNaN(days)?30:days));return d.toISOString().slice(0,10);}
function isOverdue(cliente,inv){return !inv.paid&&dueDate(cliente,inv)<today();}
function overdueCount(){if(!DB||!DB.fattureCliente)return 0;try{return DB.fattureCliente.filter(f=>{const c=DB.clienti.find(x=>x.id===f.clienteId);return isOverdue(c,f);}).length;}catch(e){return 0;}}

/* ===== PASSWORD PROTECTION ===== */
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPassword(pwd){
  const stored=localStorage.getItem('app_pwd_hash');
  const viewer=localStorage.getItem('app_pwd_viewer_hash');
  if(!stored&&!viewer)return {ok:true,role:'admin'};
  const h=await sha256(pwd);
  if(stored&&h===stored)return {ok:true,role:'admin'};
  if(viewer&&h===viewer)return {ok:true,role:'viewer'};
  return {ok:false,role:null};
}
function showAppLogin(onSuccess){
  let el=document.getElementById('app-login');
  if(!el){el=document.createElement('div');el.id='app-login';document.body.appendChild(el);}
  el.style.cssText='position:fixed;inset:0;background:#0d1b14;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:inherit';
  el.innerHTML=`<div style="background:#111f17;border:1px solid #1a3a28;border-radius:18px;box-shadow:0 16px 60px #0008;padding:48px 44px;width:360px;max-width:92vw">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:32px">
      <div style="width:46px;height:46px;background:#0ea371;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:22px">I</div>
      <div><div style="font-weight:700;font-size:18px;color:#e8f5ef">Ipsofarma</div><div style="font-size:12px;color:#4a7a60">Gestionale</div></div>
    </div>
    <div id="login-err" style="display:none;background:#3a1515;color:#f87171;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px">Password non corretta</div>
    <div style="margin-bottom:20px">
      <label style="font-size:12px;font-weight:600;color:#4a7a60;display:block;margin-bottom:6px">Password</label>
      <input id="app-pwd" type="password" placeholder="••••••••" autofocus
        style="width:100%;background:#0d1b14;border:1px solid #1a3a28;color:#e8f5ef;border-radius:9px;padding:12px 14px;font-size:15px;outline:none;box-sizing:border-box"
        onkeydown="if(event.key==='Enter')doAppLogin()">
    </div>
    <button onclick="doAppLogin()" style="width:100%;background:#0ea371;color:#fff;border:none;border-radius:9px;padding:13px;font-size:15px;font-weight:700;cursor:pointer">Accedi</button>
  </div>`;
  el._onSuccess=onSuccess;
  setTimeout(()=>{const i=document.getElementById('app-pwd');if(i)i.focus();},80);
}
async function doAppLogin(){
  const pwd=(document.getElementById('app-pwd')||{}).value||'';
  const res=await checkPassword(pwd);
  if(res.ok){
    sessionStorage.setItem('app_authenticated','1');
    sessionStorage.setItem('app_role',res.role);
    const el=document.getElementById('app-login');
    if(el)el.remove();
    render();
  }else{
    const err=document.getElementById('login-err');if(err)err.style.display='block';
    const inp=document.getElementById('app-pwd');if(inp){inp.value='';inp.focus();}
  }
}
function isAdmin(){return sessionStorage.getItem('app_role')!=='viewer';}
function isAuthenticated(){
  return !localStorage.getItem('app_pwd_hash')&&!localStorage.getItem('app_pwd_viewer_hash')||sessionStorage.getItem('app_authenticated')==='1';
}
function openSetPassword(role='admin'){
  const label=role==='admin'?'Amministratore (modifica tutto)':'Sola lettura (solo consultazione)';
  document.getElementById('modal').innerHTML=`
    <div class="modal-head"><h3>Imposta password — ${label}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Nuova password</label><input id="np1" type="password" placeholder="Almeno 4 caratteri" autocomplete="new-password"></div>
      <div class="field"><label>Conferma password</label><input id="np2" type="password" placeholder="Ripeti la password" autocomplete="new-password"></div>
      <input type="hidden" id="np-role" value="${role}">
      <p class="t-mut" style="font-size:12px;margin-top:6px">Salvata come hash crittografico — non recuperabile se dimenticata.</p>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" style="border:1px solid var(--border2)" onclick="closeModal()">Annulla</button>
      <button class="btn primary" onclick="savePassword()">Salva password</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>document.getElementById('np1')?.focus(),80);
}
async function savePassword(){
  const p1=(document.getElementById('np1')||{}).value||'';
  const p2=(document.getElementById('np2')||{}).value||'';
  const role=(document.getElementById('np-role')||{}).value||'admin';
  if(p1.length<4){toast('La password deve avere almeno 4 caratteri');return;}
  if(p1!==p2){toast('Le password non corrispondono');return;}
  const h=await sha256(p1);
  const key=role==='viewer'?'app_pwd_viewer_hash':'app_pwd_hash';
  localStorage.setItem(key,h);
  if(role==='admin')sessionStorage.setItem('app_authenticated','1');
  sessionStorage.setItem('app_role','admin');
  closeModal();toast(`✅ Password ${role==='viewer'?'sola lettura':'amministratore'} impostata`);nav('azienda');
}
function removePassword(role='admin'){
  const label=role==='viewer'?'sola lettura':'amministratore';
  if(!confirm(`Rimuovere la password ${label}?`))return;
  const key=role==='viewer'?'app_pwd_viewer_hash':'app_pwd_hash';
  localStorage.removeItem(key);
  toast(`Password ${label} rimossa`);nav('azienda');
}
function appLogout(){
  sessionStorage.removeItem('app_authenticated');
  showAppLogin(()=>{render();});
}
